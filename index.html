<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>404猫娘小爪机 · 猫爪聊天 + QQ空间</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: background 0.2s ease, color 0.2s, border-color 0.2s;
    }

    :root {
      --bg: #f5f7fa;
      --chat-bg: #f5f7fa;
      --sidebar: #ffffff;
      --text: #1e2a3a;
      --text2: #5e6f8d;
      --border: #e9ecf2;
      --ai-bubble: #ffffff;
      --user-bubble: #409eff;
      --input: #ffffff;
      --shadow: rgba(0, 0, 0, 0.03);
      --qzone-bg: #f0f2f5;
      --qzone-card: #ffffff;
    }

    [dark] {
      --bg: #1a1d23;
      --chat-bg: #1e2128;
      --sidebar: #2c2f38;
      --text: #f0f2f5;
      --text2: #b0b7c5;
      --border: #3f4450;
      --ai-bubble: #383d48;
      --user-bubble: #3b8aff;
      --input: #363b46;
      --shadow: rgba(0, 0, 0, 0.2);
      --qzone-bg: #1a1d23;
      --qzone-card: #2c2f38;
    }

    body {
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      color: var(--text);
    }

    .app {
      display: flex;
      height: 100vh;
      max-width: 100vw;
    }

    /* ----- 侧边栏 ----- */
    .sidebar {
      width: 360px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 30;
      transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1);
      box-shadow: 2px 0 12px var(--shadow);
    }

    .sidebar.hide {
      transform: translateX(-100%);
    }

    .sidebar h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      color: var(--text2);
      border: none;
      padding: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 20px;
    }
    .tab-btn.active {
      background: #409eff;
      color: white;
    }
    .tab-pane {
      display: none;
    }
    .tab-pane.active {
      display: block;
    }

    .form-item {
      margin-bottom: 1rem;
    }

    .form-item label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: var(--text2);
      margin-bottom: 0.3rem;
    }

    input, textarea, select, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      background: var(--input);
      color: var(--text);
      transition: all 0.1s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #409eff;
      box-shadow: 0 0 0 3px rgba(64,158,255,0.15);
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    button {
      background: #409eff;
      color: white;
      border: none;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    button.gray {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.gray:hover {
      background: var(--border);
    }

    button.small {
      padding: 8px 12px;
      font-size: 0.85rem;
    }

    .button-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.2rem 0;
    }

    .avatar-row {
      display: flex;
      gap: 16px;
      margin-top: 4px;
    }
    .avatar-row > div {
      flex: 1;
      text-align: center;
    }
    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      background: var(--border);
      border: 2px solid var(--border);
      margin-top: 6px;
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--sidebar);
      color: var(--text);
    }

    .emoji-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 0;
    }
    .emoji {
      font-size: 1.8rem;
      padding: 4px;
      cursor: pointer;
      border-radius: 12px;
      width: 2.4rem;
      text-align: center;
    }
    .emoji:hover { background: var(--border); }

    .menu-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      background: #409eff;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      font-size: 1.8rem;
      border: none;
      box-shadow: 0 4px 10px rgba(64,158,255,0.3);
      cursor: pointer;
    }
    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--border);
      color: var(--text2);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 30px;
      font-size: 1.4rem;
      padding: 0;
    }

    /* ----- 主内容区 ----- */
    .main-content {
      flex: 1;
      margin-left: 360px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--chat-bg);
      overflow: hidden;
    }
    .view-tabs {
      display: flex;
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      gap: 12px;
    }
    .view-tab {
      background: transparent;
      border: none;
      padding: 8px 20px;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 30px;
      color: var(--text2);
    }
    .view-tab.active {
      background: #409eff;
      color: white;
    }
    .view-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .view-pane {
      display: none;
      height: 100%;
      overflow-y: auto;
    }
    .view-pane.active {
      display: block;
    }

    /* 聊天样式 */
    .msg-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 8px 4px;
    }
    .msg-item {
      display: flex;
      gap: 8px;
      max-width: 88%;
    }
    .msg-item.user { margin-left: auto; flex-direction: row-reverse; }
    .msg-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--border);
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 22px;
      font-size: 0.95rem;
      line-height: 1.45;
      word-break: break-word;
      box-shadow: 0 2px 5px var(--shadow);
    }
    .msg-item.ai .msg-bubble { background: var(--ai-bubble); border-bottom-left-radius: 6px; }
    .msg-item.user .msg-bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 6px; }
    .input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--sidebar);
      border-top: 1px solid var(--border);
    }
    #input { flex: 1; padding: 12px 18px; border-radius: 30px; }
    #send { width: 70px; height: 52px; border-radius: 32px; }

    /* QQ空间样式 */
    .qzone-header {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      background: var(--qzone-card);
      padding: 16px;
      border-radius: 20px;
    }
    .qzone-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .qzone-input-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .qzone-textarea {
      width: 100%;
      border: none;
      background: var(--input);
      padding: 12px;
      border-radius: 20px;
      resize: none;
      font-size: 0.95rem;
    }
    .qzone-post-btn {
      align-self: flex-end;
      width: auto;
      padding: 8px 20px;
    }
    .feed-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .feed-item {
      background: var(--qzone-card);
      border-radius: 20px;
      padding: 16px;
    }
    .feed-header {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .feed-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }
    .feed-info {
      flex: 1;
    }
    .feed-name {
      font-weight: 600;
      font-size: 1rem;
    }
    .feed-time {
      font-size: 0.7rem;
      color: var(--text2);
    }
    .feed-content {
      margin: 12px 0;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .feed-actions {
      display: flex;
      gap: 24px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      color: var(--text2);
    }
    .feed-action {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }
    .feed-action:hover { color: #409eff; }
    .like-active { color: #ff4d4f; }
    .comments-area {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .comment-item {
      display: flex;
      gap: 8px;
      padding: 6px 0;
      font-size: 0.85rem;
    }
    .comment-name {
      font-weight: 500;
      color: #409eff;
    }
    .comment-text {
      color: var(--text);
    }
    .add-comment {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .add-comment input {
      flex: 1;
      padding: 8px 12px;
      font-size: 0.85rem;
    }
    .add-comment button {
      width: auto;
      padding: 8px 16px;
      font-size: 0.85rem;
    }

    .tip, .loading {
      text-align: center;
      color: var(--text2);
      padding: 30px 10px;
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.show { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .msg-item { max-width: 90%; }
    }

    #longMenu {
      position: fixed;
      background: var(--sidebar);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px 0;
      z-index: 99;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      min-width: 100px;
    }
    #longMenu div { padding: 10px 20px; cursor: pointer; }
    #longMenu div:hover { background: var(--border); }
  </style>
</head>
<body>
  <button class="menu-btn" id="menuBtn">☰</button>
  <div id="longMenu" style="display: none;"></div>

  <div class="app">
    <!-- 侧边栏 配置面板 -->
    <div class="sidebar" id="sidebar">
      <button class="close-btn" id="closeBtn">✕</button>
      <div class="tabs">
        <button class="tab-btn active" data-tab="chat-tab">💬 聊天设置</button>
        <button class="tab-btn" data-tab="qzone-tab">📱 空间设置</button>
      </div>

      <!-- 聊天设置面板 -->
      <div id="chat-tab" class="tab-pane active">
        <h2>🐾 404猫娘小爪机 · 定制版</h2>
        <div class="form-item"><label>🔐 API Key</label><input type="password" id="apiKey" placeholder="sk-..."></div>
        <div class="form-item">
          <label>🌐 API 地址 (记得后面输入/v1/chat/completions哦）</label>
          <div class="button-group">
            <input id="apiUrl" value="https://api.openai.com/v1/chat/completions">
            <button class="small gray" id="fetchModelsBtn">拉取模型</button>
          </div>
        </div>
        <div class="form-item"><label><input type="checkbox" id="useBearer" checked> API Key使用Bearer前缀</label></div>
        <div class="form-item">
          <label>🧠 模型</label>
          <select id="modelSelect"><option value="">-- 点击拉取模型 --</option></select>
          <input id="model" placeholder="或手动输入" style="margin-top: 6px;" value="gpt-3.5-turbo">
        </div>
        <div class="divider"></div>
        <div class="form-item"><label>🤖 AI 名称</label><input id="botName" value="404猫娘小爪机"></div>
        <div class="form-item"><label>📝 AI 人设</label><textarea id="prompt">你是404猫娘小爪机，一只爱卖萌的猫娘，说话结尾带喵，喜欢用颜文字 (｡•̀ᴗ-)✧</textarea></div>
        <div class="form-item"><label>👤 用户人设</label><textarea id="userPrompt">你是404小猫娘的主人。</textarea></div>
        <div class="avatar-row">
          <div><label>😺 AI头像</label><input type="file" accept="image/*" id="botAvatarInput" style="display:none;"><div class="avatar" id="botAvatar">🐱</div></div>
          <div><label>👤 我的头像</label><input type="file" accept="image/*" id="userAvatarInput" style="display:none;"><div class="avatar" id="userAvatar">😏</div></div>
        </div>
        <div class="form-item"><label>🎨 聊天背景</label><input type="color" id="bgColor" value="#f5f7fa"></div>
        <div class="form-item"><label>💬 我的气泡色</label><input type="color" id="userColor" value="#409eff"></div>
        <div class="button-group"><button class="small gray" id="darkBtn">🌓 深色切换</button><button id="save">💾 保存配置</button></div>
      </div>

      <!-- 空间设置面板 -->
      <div id="qzone-tab" class="tab-pane">
        <h2>📸 QQ空间 · 动态广场</h2>
        <div class="form-item"><label>📛 空间昵称</label><input id="qzoneNickname" placeholder="显示昵称" value="猫娘小爪机"></div>
        <div class="form-item"><label>🖼️ 空间头像</label><input type="file" accept="image/*" id="qzoneAvatarInput" style="display:none;"><div class="avatar" id="qzoneAvatar" style="width:80px;height:80px;font-size:3rem;">🐱</div></div>
        <div class="form-item"><label>🤖 AI自动评论开关</label>
          <label style="display: flex; align-items: center; gap: 8px; margin-top: 5px;">
            <input type="checkbox" id="autoCommentSwitch" checked> 发布说说后让AI自动评论
          </label>
        </div>
        <div class="divider"></div>
        <div class="form-item"><button class="small gray" id="clearQzoneBtn">🗑️ 清空所有动态</button></div>
        <div class="form-item"><small>💡 AI评论只会出现在评论区，不会刷屏聊天记录~</small></div>
      </div>

      <div class="divider"></div>
      <div class="form-item">
        <div class="emoji-panel">
          <span class="emoji">😊</span><span class="emoji">😂</span><span class="emoji">🥰</span>
          <span class="emoji">😎</span><span class="emoji">🤔</span><span class="emoji">👍</span>
          <span class="emoji">❤️</span><span class="emoji">🎉</span><span class="emoji">🐱</span>
        </div>
      </div>
      <div class="button-group">
        <button class="small gray" id="clearChat">🧹 清空聊天</button>
        <button class="small gray" id="exportCfg">📤 导出配置</button>
        <button class="small gray" id="importCfg">📥 导入配置</button>
        <input type="file" id="importFile" accept=".json" style="display:none;">
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
      <div class="view-tabs">
        <button class="view-tab active" data-view="chat">💬 聊天</button>
        <button class="view-tab" data-view="qzone">📸 QQ空间</button>
      </div>
      <div class="view-container">
        <!-- 聊天视图 -->
        <div id="chat-view" class="view-pane active">
          <div class="chat-title" style="text-align:center; padding:8px;" id="title">404猫娘小爪机</div>
          <div class="msg-box" id="msgBox"></div>
          <div class="input-bar">
            <input id="input" placeholder="说点什么...">
            <button id="send">发送</button>
          </div>
        </div>

        <!-- QQ空间视图 -->
        <div id="qzone-view" class="view-pane">
          <div class="qzone-header">
            <div class="qzone-avatar" id="qzoneHeaderAvatar">🐱</div>
            <div class="qzone-input-area">
              <textarea id="qzoneInput" class="qzone-textarea" rows="2" placeholder="分享新鲜事..."></textarea>
              <button id="publishPostBtn" class="qzone-post-btn">📢 发布说说</button>
            </div>
          </div>
          <div id="feedList" class="feed-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // 配置
      let config = JSON.parse(localStorage.getItem('catpawCfg')) || {
        apiKey: '', apiUrl: 'https://api.openai.com/v1/chat/completions', model: 'gpt-3.5-turbo',
        botName: '404猫娘小爪机', prompt: '你是404猫娘小爪机，一只爱卖萌的猫娘，说话结尾带喵，喜欢用颜文字 (｡•̀ᴗ-)✧',
        userPrompt: '你是404小猫娘的主人。',
        botAvatar: '🐱', userAvatar: '😏', bgColor: '#f5f7fa', userColor: '#409eff', dark: false, useBearer: true,
        qzoneNickname: '猫娘小爪机', qzoneAvatar: '🐱',
        autoComment: true  // AI自动评论开关
      };
      let messages = JSON.parse(localStorage.getItem('catpawMsg')) || [];
      let qzoneFeeds = JSON.parse(localStorage.getItem('catpawQzone')) || [];

      // DOM
      const sidebar = document.getElementById('sidebar');
      const msgBox = document.getElementById('msgBox');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('send');
      const feedList = document.getElementById('feedList');

      // 辅助函数
      function isEmoji(str) { return str && !str.startsWith('data:') && !str.startsWith('http') && str.length < 8; }
      function escapeHtml(unsafe) { return unsafe.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

      function saveConfig() { localStorage.setItem('catpawCfg', JSON.stringify(config)); }
      function saveMessages() { localStorage.setItem('catpawMsg', JSON.stringify(messages)); }
      function saveQzone() { localStorage.setItem('catpawQzone', JSON.stringify(qzoneFeeds)); }

      // 渲染聊天
      function renderMessages() {
        msgBox.innerHTML = '';
        if (messages.length === 0) { msgBox.innerHTML = '<div class="tip">🐱 没有消息，快和猫娘玩耍吧～</div>'; return; }
        messages.forEach(msg => {
          const item = document.createElement('div');
          item.className = `msg-item ${msg.role}`;
          const avatarVal = msg.role === 'user' ? config.userAvatar : config.botAvatar;
          let avatarHtml = isEmoji(avatarVal) ? `<div class="msg-avatar" style="font-size:1.7rem;">${avatarVal}</div>` : `<img class="msg-avatar" src="${avatarVal}">`;
          item.innerHTML = `${avatarHtml}<div class="msg-bubble">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>`;
          msgBox.appendChild(item);
        });
        msgBox.scrollTop = msgBox.scrollHeight;
      }
      function addMessage(role, text) { messages.push({ role, text }); saveMessages(); renderMessages(); }

      // 渲染QQ空间（带评论区）
      function renderQzone() {
        if (!feedList) return;
        feedList.innerHTML = '';
        if (qzoneFeeds.length === 0) { feedList.innerHTML = '<div class="tip">📭 还没有动态，发一条说说吧～</div>'; return; }
        [...qzoneFeeds].reverse().forEach(feed => {
          const feedDiv = document.createElement('div');
          feedDiv.className = 'feed-item';
          const avatarHtml = isEmoji(feed.avatar) ? `<div class="feed-avatar">${feed.avatar}</div>` : `<img class="feed-avatar" src="${feed.avatar}" style="object-fit:cover;">`;
          
          // 渲染评论区
          let commentsHtml = '';
          if (feed.comments && feed.comments.length > 0) {
            commentsHtml = `<div class="comments-area">`;
            feed.comments.forEach(comment => {
              commentsHtml += `<div class="comment-item">
                <span class="comment-name">${escapeHtml(comment.name)}：</span>
                <span class="comment-text">${escapeHtml(comment.text)}</span>
              </div>`;
            });
            commentsHtml += `</div>`;
          }
          
          // 添加评论输入框
          const commentFormHtml = `<div class="add-comment">
            <input type="text" placeholder="写评论..." id="comment-input-${feed.id}">
            <button class="comment-submit" data-id="${feed.id}">💬 评论</button>
          </div>`;
          
          feedDiv.innerHTML = `
            <div class="feed-header">
              ${avatarHtml}
              <div class="feed-info"><div class="feed-name">${escapeHtml(feed.nickname)}</div><div class="feed-time">${new Date(feed.timestamp).toLocaleString()}</div></div>
            </div>
            <div class="feed-content">${escapeHtml(feed.content).replace(/\n/g, '<br>')}</div>
            <div class="feed-actions">
              <div class="feed-action like-btn" data-id="${feed.id}">❤️ ${feed.likes || 0}</div>
              <div class="feed-action comment-toggle" data-id="${feed.id}">💬 ${feed.comments?.length || 0}</div>
            </div>
            ${commentsHtml}
            ${commentFormHtml}
          `;
          feedList.appendChild(feedDiv);
        });
        
        // 绑定点赞事件
        document.querySelectorAll('.like-btn').forEach(btn => {
          btn.addEventListener('click', (e) => { e.stopPropagation(); likeFeed(parseInt(btn.dataset.id)); });
        });
        
        // 绑定评论提交事件
        document.querySelectorAll('.comment-submit').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const feedId = parseInt(btn.dataset.id);
            const inputEl = document.getElementById(`comment-input-${feedId}`);
            const commentText = inputEl.value.trim();
            if (commentText) {
              addCommentToFeed(feedId, config.userPrompt.split('是')[1]?.trim() || '主人', commentText);
              inputEl.value = '';
            }
          });
        });
      }

      function likeFeed(id) {
        const feed = qzoneFeeds.find(f => f.id === id);
        if (feed) { feed.likes = (feed.likes || 0) + 1; saveQzone(); renderQzone(); }
      }

      function addCommentToFeed(feedId, commenterName, commentText) {
        const feed = qzoneFeeds.find(f => f.id === feedId);
        if (feed) {
          if (!feed.comments) feed.comments = [];
          feed.comments.push({ name: commenterName, text: commentText, timestamp: Date.now() });
          saveQzone();
          renderQzone();
        }
      }

      // AI自动评论（只添加到评论区，不同步到聊天记录）
      async function autoCommentOnPost(feedId, feedContent) {
        if (!config.autoComment) return;
        if (!config.apiKey) { console.log('未配置API Key，跳过AI评论'); return; }
        
        const aiName = config.botName || '猫娘';
        const systemPrompt = `${config.prompt}\n你的主人刚刚在QQ空间发了一条说说："${feedContent.slice(0, 100)}"\n请根据你的人设，写一条简短的评论回复这条说说。评论要自然、有趣，符合你的性格。只输出评论内容，不要加引号或其他标记。`;
        
        try {
          const headers = { 'Content-Type': 'application/json' };
          if (config.useBearer) headers['Authorization'] = `Bearer ${config.apiKey}`;
          else headers['Authorization'] = config.apiKey;
          
          const res = await fetch(config.apiUrl, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify({
              model: config.model,
              messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: '请评论这条说说' }],
              temperature: 0.9,
              max_tokens: 150
            })
          });
          
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const comment = data.choices?.[0]?.message?.content?.trim() || '喵~ 这个说说好有趣！(｡•̀ᴗ-)✧';
          
          // 添加AI评论到动态（不同步到聊天记录）
          const feed = qzoneFeeds.find(f => f.id === feedId);
          if (feed) {
            if (!feed.comments) feed.comments = [];
            feed.comments.push({ name: aiName, text: comment, timestamp: Date.now() });
            saveQzone();
            renderQzone();
          }
        } catch (err) {
          console.error('AI评论失败:', err);
        }
      }

      // 发布说说并触发AI评论
      async function publishPost() {
        const content = document.getElementById('qzoneInput').value.trim();
        if (!content) return;
        
        const newFeed = {
          id: Date.now(),
          nickname: config.qzoneNickname || '猫娘小爪机',
          avatar: config.qzoneAvatar,
          content: content,
          timestamp: Date.now(),
          likes: 0,
          comments: []
        };
        qzoneFeeds.unshift(newFeed);
        saveQzone();
        document.getElementById('qzoneInput').value = '';
        renderQzone();
        
        // 触发AI自动评论（异步，不阻塞界面）
        autoCommentOnPost(newFeed.id, content);
      }

      // 拉取模型
      async function fetchModels() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const baseUrl = document.getElementById('apiUrl').value.trim();
        if (!apiKey) { alert('请填写API Key'); return; }
        let modelsUrl = baseUrl.replace('/chat/completions', '/models');
        if (!modelsUrl.includes('/models')) modelsUrl = modelsUrl.replace(/\/$/, '') + '/models';
        const selectEl = document.getElementById('modelSelect');
        selectEl.innerHTML = '<option>加载中...</option>';
        const headers = { 'Content-Type': 'application/json' };
        if (document.getElementById('useBearer').checked) headers['Authorization'] = `Bearer ${apiKey}`;
        else headers['Authorization'] = apiKey;
        try {
          const res = await fetch(modelsUrl, { method: 'GET', headers });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          let modelList = data.data || data;
          if (!Array.isArray(modelList)) modelList = [];
          selectEl.innerHTML = '<option value="">-- 选择模型 --</option>';
          modelList.forEach(m => { if (m.id) { let opt = document.createElement('option'); opt.value = m.id; opt.textContent = m.id; selectEl.appendChild(opt); } });
        } catch (err) { alert('拉取失败: ' + err.message); selectEl.innerHTML = '<option value="">-- 拉取失败 --</option>'; }
      }

      // 发送聊天消息
      async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        if (!config.apiKey) { alert('请先保存API Key'); return; }
        input.value = '';
        addMessage('user', text);

        // AI能看到最近的动态作为背景知识
        const recentFeeds = qzoneFeeds.slice(0, 3).map(f => `「${f.nickname}：${f.content.slice(0, 50)}」`).join('；');
        const systemContent = `${config.prompt}\n(重要：${config.userPrompt})\n主人最近的空间动态：${recentFeeds || '暂无'}。你可以偶尔提及，但不需要主动评论。`;
        
        const apiMessages = [
          { role: 'system', content: systemContent },
          ...messages.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }))
        ];
        
        const loadDiv = document.createElement('div'); loadDiv.className = 'loading'; loadDiv.innerText = '🐾 猫娘歪头思考中...';
        msgBox.appendChild(loadDiv); msgBox.scrollTop = msgBox.scrollHeight;
        try {
          const headers = { 'Content-Type': 'application/json' };
          if (config.useBearer) headers['Authorization'] = `Bearer ${config.apiKey}`;
          else headers['Authorization'] = config.apiKey;
          const res = await fetch(config.apiUrl, {
            method: 'POST', headers, body: JSON.stringify({ model: config.model, messages: apiMessages, temperature: 0.8, max_tokens: 800 })
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const reply = data.choices?.[0]?.message?.content || '喵？没有回复内容';
          addMessage('ai', reply);
        } catch (err) { addMessage('ai', '⚠️ 请求出错: ' + err.message); }
        finally { if (loadDiv.parentNode) loadDiv.remove(); }
      }

      // UI加载配置
      function loadUI() {
        document.getElementById('apiKey').value = config.apiKey || '';
        document.getElementById('apiUrl').value = config.apiUrl;
        document.getElementById('model').value = config.model;
        document.getElementById('botName').value = config.botName;
        document.getElementById('prompt').value = config.prompt;
        document.getElementById('userPrompt').value = config.userPrompt || '';
        document.getElementById('bgColor').value = config.bgColor;
        document.getElementById('userColor').value = config.userColor;
        document.getElementById('useBearer').checked = config.useBearer !== false;
        document.getElementById('qzoneNickname').value = config.qzoneNickname || '猫娘小爪机';
        document.getElementById('autoCommentSwitch').checked = config.autoComment !== false;
        
        config.qzoneAvatar = config.qzoneAvatar || '🐱';
        const qzoneAvatarDiv = document.getElementById('qzoneAvatar');
        if (isEmoji(config.qzoneAvatar)) { qzoneAvatarDiv.innerText = config.qzoneAvatar; qzoneAvatarDiv.style.fontSize = '3rem'; }
        else { qzoneAvatarDiv.innerHTML = `<img src="${config.qzoneAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`; }
        document.getElementById('qzoneHeaderAvatar').innerHTML = isEmoji(config.qzoneAvatar) ? config.qzoneAvatar : `<img src="${config.qzoneAvatar}" style="width:100%;height:100%;border-radius:50%;">`;
        
        const botAvatarDiv = document.getElementById('botAvatar');
        if (isEmoji(config.botAvatar)) { botAvatarDiv.innerText = config.botAvatar; botAvatarDiv.style.fontSize = '2.5rem'; }
        else { botAvatarDiv.innerHTML = `<img src="${config.botAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`; }
        const userAvatarDiv = document.getElementById('userAvatar');
        if (isEmoji(config.userAvatar)) { userAvatarDiv.innerText = config.userAvatar; userAvatarDiv.style.fontSize = '2.5rem'; }
        else { userAvatarDiv.innerHTML = `<img src="${config.userAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`; }
        
        document.getElementById('title').innerText = config.botName;
        if (config.dark) document.documentElement.setAttribute('dark', '');
        else document.documentElement.removeAttribute('dark');
        document.getElementById('chat-view').style.backgroundColor = config.bgColor;
        document.documentElement.style.setProperty('--user-bubble', config.userColor);
      }

      function saveAll() {
        config.apiKey = document.getElementById('apiKey').value.trim();
        config.apiUrl = document.getElementById('apiUrl').value.trim();
        config.model = document.getElementById('model').value.trim();
        config.botName = document.getElementById('botName').value.trim() || '404猫娘小爪机';
        config.prompt = document.getElementById('prompt').value.trim();
        config.userPrompt = document.getElementById('userPrompt').value.trim();
        config.bgColor = document.getElementById('bgColor').value;
        config.userColor = document.getElementById('userColor').value;
        config.useBearer = document.getElementById('useBearer').checked;
        config.qzoneNickname = document.getElementById('qzoneNickname').value.trim() || '猫娘小爪机';
        config.autoComment = document.getElementById('autoCommentSwitch').checked;
        saveConfig();
        loadUI();
        alert('配置已保存');
        sidebar.classList.remove('show');
      }

      // 头像上传
      function setupAvatarUpload(triggerId, inputId, key, displayId) {
        document.getElementById(triggerId).addEventListener('click', () => document.getElementById(inputId).click());
        document.getElementById(inputId).addEventListener('change', function(e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => { config[key] = ev.target.result; saveConfig(); loadUI(); };
          reader.readAsDataURL(file);
        });
      }
      setupAvatarUpload('botAvatar', 'botAvatarInput', 'botAvatar', 'botAvatar');
      setupAvatarUpload('userAvatar', 'userAvatarInput', 'userAvatar', 'userAvatar');
      setupAvatarUpload('qzoneAvatar', 'qzoneAvatarInput', 'qzoneAvatar', 'qzoneAvatar');

      // 标签页切换
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.tab).classList.add('active');
        });
      });
      document.querySelectorAll('.view-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.view + '-view').classList.add('active');
        });
      });

      // 事件绑定
      document.getElementById('fetchModelsBtn').addEventListener('click', fetchModels);
      document.getElementById('modelSelect').addEventListener('change', e => { if(e.target.value) document.getElementById('model').value = e.target.value; });
      document.getElementById('save').addEventListener('click', saveAll);
      document.getElementById('darkBtn').addEventListener('click', () => { config.dark = !config.dark; saveConfig(); loadUI(); });
      document.getElementById('clearChat').addEventListener('click', () => { if(confirm('清空聊天？')) { messages = []; saveMessages(); renderMessages(); } });
      document.getElementById('clearQzoneBtn').addEventListener('click', () => { if(confirm('清空所有空间动态？')) { qzoneFeeds = []; saveQzone(); renderQzone(); } });
      document.getElementById('publishPostBtn').addEventListener('click', publishPost);
      document.getElementById('exportCfg').addEventListener('click', () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(config)])); a.download = 'catpaw-config.json'; a.click(); });
      document.getElementById('importCfg').addEventListener('click', () => document.getElementById('importFile').click());
      document.getElementById('importFile').addEventListener('change', e => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => { try { const imported = JSON.parse(ev.target.result); config = { ...config, ...imported }; saveConfig(); loadUI(); alert('导入成功'); } catch(e) { alert('无效文件'); } };
        reader.readAsText(file);
      });
      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
      document.querySelectorAll('.emoji').forEach(em => { em.addEventListener('click', () => { input.value += em.innerText; input.focus(); }); });
      menuBtn.addEventListener('click', () => sidebar.classList.add('show'));
      closeBtn.addEventListener('click', () => sidebar.classList.remove('show'));

      // 长按复制
      const msgContainer = document.getElementById('msgBox');
      const longMenu = document.getElementById('longMenu');
      msgContainer.addEventListener('contextmenu', (e) => { e.preventDefault(); const sel = window.getSelection().toString().trim(); if(sel) { longMenu.innerHTML = '<div id="copyOption">📋 复制</div>'; longMenu.style.display = 'block'; longMenu.style.left = e.pageX + 'px'; longMenu.style.top = e.pageY + 'px'; document.getElementById('copyOption').onclick = () => { navigator.clipboard.writeText(sel); longMenu.style.display = 'none'; }; setTimeout(() => { document.addEventListener('click', () => longMenu.style.display = 'none', { once: true }); }, 10); } });
      
      loadUI();
      renderMessages();
      renderQzone();
    })();
  </script>
</body>
</html>
