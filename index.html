<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>404猫娘小爪机 · 猫爪聊天</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: background 0.2s ease, color 0.2s, border-color 0.2s;
    }

    :root {
      --bg: #f5f7fa;
      --chat-bg: #f5f7fa;
      --sidebar: #ffffff;
      --text: #1e2a3a;
      --text2: #5e6f8d;
      --border: #e9ecf2;
      --ai-bubble: #ffffff;
      --user-bubble: #409eff;
      --input: #ffffff;
      --shadow: rgba(0, 0, 0, 0.03);
    }

    [dark] {
      --bg: #1a1d23;
      --chat-bg: #1e2128;
      --sidebar: #2c2f38;
      --text: #f0f2f5;
      --text2: #b0b7c5;
      --border: #3f4450;
      --ai-bubble: #383d48;
      --user-bubble: #3b8aff;
      --input: #363b46;
      --shadow: rgba(0, 0, 0, 0.2);
    }

    body {
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      color: var(--text);
    }

    .app {
      display: flex;
      height: 100vh;
      max-width: 100vw;
    }

    /* ----- 侧边栏 ----- */
    .sidebar {
      width: 360px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 30;
      transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1);
      box-shadow: 2px 0 12px var(--shadow);
    }

    .sidebar.hide {
      transform: translateX(-100%);
    }

    .sidebar h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .form-item {
      margin-bottom: 1rem;
    }

    .form-item label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: var(--text2);
      margin-bottom: 0.3rem;
    }

    input, textarea, select, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      background: var(--input);
      color: var(--text);
      transition: all 0.1s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #409eff;
      box-shadow: 0 0 0 3px rgba(64,158,255,0.15);
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    button {
      background: #409eff;
      color: white;
      border: none;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    button.gray {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.gray:hover {
      background: var(--border);
    }

    button.small {
      padding: 8px 12px;
      font-size: 0.85rem;
    }

    .button-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .button-group button {
      flex: 1;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.2rem 0;
    }

    /* 头像行 */
    .avatar-row {
      display: flex;
      gap: 16px;
      margin-top: 4px;
    }

    .avatar-row > div {
      flex: 1;
      text-align: center;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      background: var(--border);
      border: 2px solid var(--border);
      margin-top: 6px;
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--sidebar);
      color: var(--text);
    }

    /* 表情 */
    .emoji-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 0;
    }

    .emoji {
      font-size: 1.8rem;
      padding: 4px;
      cursor: pointer;
      border-radius: 12px;
      width: 2.4rem;
      text-align: center;
      transition: background 0.1s;
    }

    .emoji:hover {
      background: var(--border);
    }

    .menu-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      background: #409eff;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      font-size: 1.8rem;
      border: none;
      box-shadow: 0 4px 10px rgba(64,158,255,0.3);
      cursor: pointer;
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--border);
      color: var(--text2);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 30px;
      font-size: 1.4rem;
      line-height: 1;
      padding: 0;
    }

    /* ----- 聊天区 ----- */
    .chat {
      flex: 1;
      margin-left: 360px;
      display: flex;
      flex-direction: column;
      padding: 20px 16px 16px;
      background: var(--chat-bg);
      height: 100vh;
    }

    .chat-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 6px 0 14px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .msg-box {
      flex: 1;
      overflow-y: auto;
      padding: 8px 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .msg-item {
      display: flex;
      gap: 8px;
      max-width: 88%;
    }

    .msg-item.user {
      margin-left: auto;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--border);
      object-fit: cover;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: var(--sidebar);
      color: var(--text);
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 22px;
      font-size: 0.95rem;
      line-height: 1.45;
      word-break: break-word;
      box-shadow: 0 2px 5px var(--shadow);
    }

    .msg-item.ai .msg-bubble {
      background: var(--ai-bubble);
      border-bottom-left-radius: 6px;
      color: var(--text);
    }

    .msg-item.user .msg-bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .tip, .loading {
      text-align: center;
      color: var(--text2);
      padding: 30px 10px;
      font-size: 0.9rem;
    }

    .input-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding-top: 12px;
    }

    #input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 30px;
      font-size: 1rem;
      background: var(--input);
    }

    #send {
      width: 70px;
      height: 52px;
      border-radius: 32px;
      background: #409eff;
    }

    /* 长按菜单 */
    #longMenu {
      position: fixed;
      background: var(--sidebar);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px 0;
      z-index: 99;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      min-width: 100px;
      backdrop-filter: blur(5px);
    }

    #longMenu div {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
    }

    #longMenu div:hover {
      background: var(--border);
    }

    /* 手机适配 */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        box-shadow: 4px 0 20px rgba(0,0,0,0.15);
      }
      .sidebar.show {
        transform: translateX(0);
      }
      .chat {
        margin-left: 0;
        padding: 60px 12px 12px;
      }
      .msg-item {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>
  <button class="menu-btn" id="menuBtn">☰</button>
  <div id="longMenu" style="display: none;"></div>

  <div class="app">
    <!-- 侧边栏 配置面板 (新增模型列表 + 用户人设) -->
    <div class="sidebar" id="sidebar">
      <button class="close-btn" id="closeBtn">✕</button>
      <h2>🐾 404猫娘小爪机 · 定制版</h2>

      <div class="form-item">
        <label>🔐 API Key</label>
        <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
      </div>
      <div class="form-item">
        <label>🌐 API 地址</label>
        <div class="button-group">
          <input id="apiUrl" value="https://api.openai.com/v1/chat/completions" style="flex:3;">
          <button class="small gray" id="fetchModelsBtn" style="flex:1;">拉取模型</button>
        </div>
      </div>

      <!-- 新增：是否使用Bearer前缀的开关 -->
      <div class="form-item">
        <label style="display: flex; align-items: center; gap: 8px;">
          <input type="checkbox" id="useBearer" checked style="width: auto; margin: 0;">
          API Key使用Bearer前缀
        </label>
      </div>

      <!-- 模型下拉选择 (新增) -->
      <div class="form-item">
        <label>🧠 可用模型 (选择或手动输入)</label>
        <select id="modelSelect">
          <option value="">-- 点击拉取模型 --</option>
        </select>
        <input id="model" placeholder="或手动输入模型名" style="margin-top: 6px;" value="gpt-3.5-turbo">
      </div>

      <div class="divider"></div>

      <div class="form-item">
        <label>🤖 AI 名称</label>
        <input id="botName" value="404猫娘小爪机">
      </div>
      <div class="form-item">
        <label>📝 AI 人设提示词</label>
        <textarea id="prompt" placeholder="例: 你是一只可爱的猫娘">你是404猫娘小爪机，一只爱卖萌的猫娘，说话结尾带喵，喜欢用颜文字 (｡•̀ᴗ-)✧</textarea>
      </div>

      <!-- 用户人设输入 (新增) 默认：你是404小猫娘的主人。 -->
      <div class="form-item">
        <label>👤 用户人设 (对AI的称呼/身份)</label>
        <textarea id="userPrompt" placeholder="例如：你是我的主人">你是404小猫娘的主人。</textarea>
      </div>

      <div class="form-item avatar-row">
        <div>
          <label>😺 AI头像</label>
          <input type="file" accept="image/*" id="botAvatarInput" style="display: none;">
          <div class="avatar" id="botAvatar">🐱</div>
        </div>
        <div>
          <label>👤 我的头像</label>
          <input type="file" accept="image/*" id="userAvatarInput" style="display: none;">
          <div class="avatar" id="userAvatar">😏</div>
        </div>
      </div>

      <div class="form-item">
        <label>🎨 聊天背景</label>
        <input type="color" id="bgColor" value="#f5f7fa">
      </div>
      <div class="form-item">
        <label>💬 我的气泡色</label>
        <input type="color" id="userColor" value="#409eff">
      </div>

      <div class="form-item">
        <button class="small gray" id="darkBtn">🌓 深色/浅色切换</button>
      </div>
      <div class="form-item">
        <button id="save">💾 保存配置</button>
      </div>

      <div class="divider"></div>

      <div class="form-item">
        <label>😋 快捷表情</label>
        <div class="emoji-panel">
          <span class="emoji">😊</span><span class="emoji">😂</span><span class="emoji">🥰</span>
          <span class="emoji">😎</span><span class="emoji">🤔</span><span class="emoji">👍</span>
          <span class="emoji">❤️</span><span class="emoji">🎉</span><span class="emoji">🐱</span>
          <span class="emoji">✨</span><span class="emoji">🙀</span><span class="emoji">🍕</span>
        </div>
      </div>

      <div class="form-item" style="display: flex; gap: 6px; flex-wrap: wrap;">
        <button class="small gray" id="clearChat">🧹 清空聊天</button>
        <button class="small gray" id="exportCfg">📤 导出配置</button>
        <button class="small gray" id="importCfg">📥 导入配置</button>
        <input type="file" id="importFile" accept=".json" style="display: none;">
      </div>

      <div style="font-size:0.75rem; color: var(--text2); text-align: center; margin-top: 16px; opacity:0.7;">
        ⚡ 数据本地 · 猫娘随行<br>
        📢 提示：直接请求OpenAI官方API会跨域，建议使用反向代理
      </div>
    </div>

    <!-- 聊天主区域 -->
    <div class="chat" id="chat">
      <div class="chat-title" id="title">404猫娘小爪机</div>
      <div class="msg-box" id="msgBox">
        <div class="tip">🐱 左边配置API，拉取模型，保存后开撩～</div>
      </div>
      <div class="input-bar">
        <input id="input" placeholder="说点什么..." autocomplete="off">
        <button id="send">发送</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // DOM 元素
      const sidebar = document.getElementById('sidebar');
      const menuBtn = document.getElementById('menuBtn');
      const closeBtn = document.getElementById('closeBtn');
      const msgBox = document.getElementById('msgBox');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('send');
      const longMenu = document.getElementById('longMenu');
      const useBearer = document.getElementById('useBearer');

      // 配置初始值 —— 新增 userPrompt 字段，默认 "你是404小猫娘的主人。"
      let config = JSON.parse(localStorage.getItem('catpawCfg')) || {
        apiKey: '',
        apiUrl: 'https://api.openai.com/v1/chat/completions',
        model: 'gpt-3.5-turbo',
        botName: '404猫娘小爪机',
        prompt: '你是404猫娘小爪机，一只爱卖萌的猫娘，说话结尾带喵，喜欢用颜文字 (｡•̀ᴗ-)✧',
        userPrompt: '你是404小猫娘的主人。',    // 新增用户人设
        botAvatar: '🐱',
        userAvatar: '😏',
        bgColor: '#f5f7fa',
        userColor: '#409eff',
        dark: false,
        useBearer: true // 新增：是否使用Bearer前缀
      };

      let messages = JSON.parse(localStorage.getItem('catpawMsg')) || [];

      // 辅助函数
      function isEmoji(str) {
        return str && !str.startsWith('data:') && !str.startsWith('http') && str.length < 8;
      }

      // 加载UI
      function loadUI() {
        document.getElementById('apiKey').value = config.apiKey || '';
        document.getElementById('apiUrl').value = config.apiUrl;
        document.getElementById('model').value = config.model || 'gpt-3.5-turbo';
        document.getElementById('botName').value = config.botName;
        document.getElementById('prompt').value = config.prompt;
        document.getElementById('userPrompt').value = config.userPrompt || '你是404小猫娘的主人。'; // 回显
        document.getElementById('bgColor').value = config.bgColor;
        document.getElementById('userColor').value = config.userColor;
        useBearer.checked = config.useBearer !== false; // 加载Bearer开关状态

        // 头像
        const botAvatarEl = document.getElementById('botAvatar');
        const userAvatarEl = document.getElementById('userAvatar');
        if (isEmoji(config.botAvatar)) {
          botAvatarEl.innerText = config.botAvatar;
          botAvatarEl.style.background = 'var(--sidebar)';
          botAvatarEl.style.fontSize = '2.5rem';
        } else {
          botAvatarEl.innerHTML = `<img src="${config.botAvatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
          botAvatarEl.style.fontSize = 'initial';
        }
        if (isEmoji(config.userAvatar)) {
          userAvatarEl.innerText = config.userAvatar;
          userAvatarEl.style.background = 'var(--sidebar)';
          userAvatarEl.style.fontSize = '2.5rem';
        } else {
          userAvatarEl.innerHTML = `<img src="${config.userAvatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
          userAvatarEl.style.fontSize = 'initial';
        }

        document.getElementById('title').innerText = config.botName;

        if (config.dark) document.documentElement.setAttribute('dark', '');
        else document.documentElement.removeAttribute('dark');

        document.getElementById('chat').style.backgroundColor = config.bgColor;
        document.documentElement.style.setProperty('--user-bubble', config.userColor);
      }

      // 渲染消息 (带emoji头像)
      function renderMessages() {
        msgBox.innerHTML = '';
        if (messages.length === 0) {
          msgBox.innerHTML = '<div class="tip">🐱 没有消息，快和猫娘玩耍吧～</div>';
          return;
        }
        messages.forEach(msg => {
          const item = document.createElement('div');
          item.className = `msg-item ${msg.role}`;

          const avatarVal = msg.role === 'user' ? config.userAvatar : config.botAvatar;
          let avatarHtml = '';
          if (isEmoji(avatarVal)) {
            avatarHtml = `<div class="msg-avatar" style="font-size:1.7rem;">${avatarVal}</div>`;
          } else {
            avatarHtml = `<img class="msg-avatar" src="${avatarVal}" alt="avatar">`;
          }

          const escapedText = escapeHtml(msg.text).replace(/\n/g, '<br>');
          item.innerHTML = `${avatarHtml}<div class="msg-bubble">${escapedText}</div>`;
          msgBox.appendChild(item);
        });
        msgBox.scrollTop = msgBox.scrollHeight;
      }

      function escapeHtml(unsafe) {
        return unsafe.replace(/[&<>"]/g, function(m) {
          if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
          return m;
        });
      }

      function addMessage(role, text) {
        messages.push({ role, text });
        localStorage.setItem('catpawMsg', JSON.stringify(messages));
        renderMessages();
      }

      // ---------- 修复：拉取模型列表 (优化地址处理+错误提示) ----------
      async function fetchModels() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const baseUrl = document.getElementById('apiUrl').value.trim();
        
        // 基础校验
        if (!apiKey) { 
          alert('请先填写API Key'); 
          return; 
        }
        if (!baseUrl) {
          alert('请填写API地址');
          return;
        }

        // 修复：更鲁棒的models地址生成逻辑
        let modelsUrl = '';
        try {
          const urlObj = new URL(baseUrl);
          // 方法1：如果是chat/completions路径，替换为models
          if (urlObj.pathname.includes('/chat/completions')) {
            modelsUrl = `${urlObj.protocol}//${urlObj.host}${urlObj.pathname.replace('/chat/completions', '/models')}`;
          } 
          // 方法2：如果是v1路径，直接拼接/models
          else if (urlObj.pathname.includes('/v1/')) {
            modelsUrl = `${urlObj.protocol}//${urlObj.host}/v1/models`;
          }
          // 方法3：默认在域名后加/models
          else {
            modelsUrl = `${urlObj.protocol}//${urlObj.host}/models`;
          }
        } catch (err) {
          alert('API地址格式错误：' + err.message);
          return;
        }

        const selectEl = document.getElementById('modelSelect');
        selectEl.innerHTML = '<option value="">加载中...</option>';
        
        // 构建请求头
        const headers = {
          'Content-Type': 'application/json'
        };
        // 修复：可选的Bearer前缀
        if (useBearer.checked) {
          headers['Authorization'] = `Bearer ${apiKey}`;
        } else {
          headers['Authorization'] = apiKey;
        }

        try {
          // 修复：添加超时和更全面的错误处理
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 10000); // 10秒超时

          const res = await fetch(modelsUrl, {
            method: 'GET',
            headers: headers,
            signal: controller.signal,
            mode: 'cors'
          });

          clearTimeout(timeoutId);

          if (!res.ok) {
            let errMsg = `请求失败 [${res.status}]`;
            // 解析错误详情
            try {
              const errData = await res.json();
              errMsg += `: ${errData.error?.message || JSON.stringify(errData).slice(0, 100)}`;
            } catch {
              const errText = await res.text();
              errMsg += `: ${errText.slice(0, 100)}`;
            }
            // 跨域提示
            if (res.status === 0) {
              errMsg += '\n\n⚠️ 可能是跨域(CORS)限制！建议：\n1. 使用支持CORS的API反向代理\n2. 部署到服务器运行\n3. 浏览器安装跨域插件临时测试';
            }
            throw new Error(errMsg);
          }

          const data = await res.json();
          // 适配多种模型列表返回格式
          let modelList = [];
          if (data.data && Array.isArray(data.data)) {
            modelList = data.data;
          } else if (Array.isArray(data)) {
            modelList = data;
          } else {
            throw new Error('返回格式不支持：未找到模型列表数组');
          }

          // 渲染模型列表
          if (modelList.length === 0) {
            selectEl.innerHTML = '<option value="">-- 未找到可用模型 --</option>';
            return;
          }

          selectEl.innerHTML = '<option value="">-- 选择模型 --</option>';
          modelList.forEach(m => {
            if (m.id) { // OpenAI格式
              const opt = document.createElement('option');
              opt.value = m.id;
              opt.textContent = m.id;
              selectEl.appendChild(opt);
            } else if (m.name) { // 其他自定义格式
              const opt = document.createElement('option');
              opt.value = m.name;
              opt.textContent = m.name;
              selectEl.appendChild(opt);
            }
          });

        } catch (err) {
          let errMsg = '拉取模型失败: ' + err.message;
          // 超时提示
          if (err.name === 'AbortError') {
            errMsg = '请求超时（10秒），请检查网络或API地址';
          }
          alert(errMsg);
          selectEl.innerHTML = '<option value="">-- 拉取失败，可手动输入 --</option>';
        }
      }

      // 监听模型选择下拉，同步到输入框
      document.getElementById('modelSelect').addEventListener('change', function(e) {
        if (e.target.value) {
          document.getElementById('model').value = e.target.value;
        }
      });

      document.getElementById('fetchModelsBtn').addEventListener('click', fetchModels);

      // ---------- 发送消息 (优化请求头+错误处理) ----------
      async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        if (!config.apiKey) { 
          alert('请先填写并保存API Key'); 
          return; 
        }
        input.value = '';
        addMessage('user', text);

        // 构建消息: system = AI人设 + 用户人设
        const aiPrompt = config.prompt || '你是猫娘';
        const userPrompt = config.userPrompt || '你是我的主人';
        const systemContent = `${aiPrompt}\n(重要：${userPrompt})`;

        const apiMessages = [
          { role: 'system', content: systemContent },
          ...messages.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }))
        ];

        const loadDiv = document.createElement('div');
        loadDiv.className = 'loading';
        loadDiv.innerText = '🐾 猫娘歪头思考中...';
        msgBox.appendChild(loadDiv);
        msgBox.scrollTop = msgBox.scrollHeight;

        try {
          // 构建请求头
          const headers = {
            'Content-Type': 'application/json'
          };
          // 修复：统一的Bearer前缀处理
          if (config.useBearer) {
            headers['Authorization'] = `Bearer ${config.apiKey}`;
          } else {
            headers['Authorization'] = config.apiKey;
          }

          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 30000); // 30秒超时

          const res = await fetch(config.apiUrl, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify({
              model: config.model,
              messages: apiMessages,
              temperature: 0.8,
              max_tokens: 1500
            }),
            signal: controller.signal,
            mode: 'cors'
          });

          clearTimeout(timeoutId);

          if (!res.ok) {
            const errText = await res.text();
            let errMsg = `HTTP ${res.status}: ${errText.slice(0, 200)}`;
            // 跨域提示
            if (res.status === 0) {
              errMsg += '\n\n⚠️ 跨域(CORS)限制！请使用反向代理API';
            }
            throw new Error(errMsg);
          }

          const data = await res.json();
          const reply = data.choices?.[0]?.message?.content || '没有收到回复内容';
          addMessage('ai', reply);
        } catch (err) {
          addMessage('ai', '⚠️ 请求出错: ' + err.message);
        } finally {
          if (loadDiv.parentNode) loadDiv.remove();
        }
      }

      // 保存配置 (新增useBearer)
      document.getElementById('save').addEventListener('click', function() {
        config.apiKey = document.getElementById('apiKey').value.trim();
        config.apiUrl = document.getElementById('apiUrl').value.trim();
        config.model = document.getElementById('model').value.trim();
        config.botName = document.getElementById('botName').value.trim() || '404猫娘小爪机';
        config.prompt = document.getElementById('prompt').value.trim() || '可爱猫娘';
        config.userPrompt = document.getElementById('userPrompt').value.trim() || '你是404小猫娘的主人。';
        config.bgColor = document.getElementById('bgColor').value;
        config.userColor = document.getElementById('userColor').value;
        config.useBearer = useBearer.checked; // 保存Bearer开关状态
        // 头像已通过文件上传修改config，但需要保留文本emoji不变
        localStorage.setItem('catpawCfg', JSON.stringify(config));
        document.getElementById('title').innerText = config.botName;
        document.getElementById('chat').style.backgroundColor = config.bgColor;
        document.documentElement.style.setProperty('--user-bubble', config.userColor);
        loadUI();  // 刷新显示
        alert('配置已保存');
        sidebar.classList.remove('show');
      });

      // 头像上传处理
      function handleAvatarInput(inputEl, key, displayEl) {
        inputEl.addEventListener('change', function(e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            config[key] = ev.target.result;
            displayEl.innerHTML = `<img src="${ev.target.result}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
            displayEl.style.fontSize = 'initial';
          };
          reader.readAsDataURL(file);
        });
      }

      const botAvatarDiv = document.getElementById('botAvatar');
      const userAvatarDiv = document.getElementById('userAvatar');
      document.getElementById('botAvatar').addEventListener('click', () => document.getElementById('botAvatarInput').click());
      document.getElementById('userAvatar').addEventListener('click', () => document.getElementById('userAvatarInput').click());
      handleAvatarInput(document.getElementById('botAvatarInput'), 'botAvatar', botAvatarDiv);
      handleAvatarInput(document.getElementById('userAvatarInput'), 'userAvatar', userAvatarDiv);

      // 暗色模式
      document.getElementById('darkBtn').addEventListener('click', function() {
        config.dark = !config.dark;
        if (config.dark) document.documentElement.setAttribute('dark', '');
        else document.documentElement.removeAttribute('dark');
        localStorage.setItem('catpawCfg', JSON.stringify(config));
      });

      document.getElementById('clearChat').addEventListener('click', function() {
        if (confirm('确定清空所有聊天记录吗？')) {
          messages = [];
          localStorage.removeItem('catpawMsg');
          renderMessages();
        }
      });

      document.querySelectorAll('.emoji').forEach(em => {
        em.addEventListener('click', function() { input.value += this.innerText; input.focus(); });
      });

      document.getElementById('exportCfg').addEventListener('click', function() {
        const dataStr = JSON.stringify(config, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `catpaw-config-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
      });

      document.getElementById('importCfg').addEventListener('click', () => document.getElementById('importFile').click());
      document.getElementById('importFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            config = { ...config, ...imported };
            localStorage.setItem('catpawCfg', JSON.stringify(config));
            loadUI();
            alert('导入成功');
          } catch { alert('无效的配置文件'); }
        };
        reader.readAsText(file);
      });

      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

      menuBtn.addEventListener('click', () => sidebar.classList.add('show'));
      closeBtn.addEventListener('click', () => sidebar.classList.remove('show'));
      document.querySelector('.chat').addEventListener('click', () => {
        if (window.innerWidth <= 768 && sidebar.classList.contains('show')) sidebar.classList.remove('show');
      });

      // 长按复制
      function showLongMenu(e) {
        e.preventDefault();
        const selection = window.getSelection().toString().trim();
        if (!selection) return;
        longMenu.innerHTML = '<div id="copyOption">📋 复制</div>';
        longMenu.style.display = 'block';
        longMenu.style.left = e.pageX + 'px';
        longMenu.style.top = e.pageY + 'px';
        document.getElementById('copyOption').onclick = function() {
          navigator.clipboard.writeText(selection).then(() => alert('已复制')).catch(() => alert('复制失败'));
          longMenu.style.display = 'none';
        };
        setTimeout(() => {
          document.addEventListener('click', function hide() { longMenu.style.display = 'none'; document.removeEventListener('click', hide); }, { once: true });
        }, 10);
      }
      msgBox.addEventListener('contextmenu', showLongMenu);
      let touchTimer = null;
      msgBox.addEventListener('touchstart', (e) => { touchTimer = setTimeout(() => showLongMenu(e), 500); });
      msgBox.addEventListener('touchend', () => clearTimeout(touchTimer));
      msgBox.addEventListener('touchmove', () => clearTimeout(touchTimer));

      // 实时颜色预览
      document.getElementById('bgColor').addEventListener('input', (e) => document.getElementById('chat').style.backgroundColor = e.target.value);
      document.getElementById('userColor').addEventListener('input', (e) => document.documentElement.style.setProperty('--user-bubble', e.target.value));

      // 启动
      loadUI();
      renderMessages();
    })();
  </script>
</body>
</html>
