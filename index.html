<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>404猫娘小爪机 · 猫爪聊天</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    :root {
      --bg: #f5f7fa;
      --chat-bg: #f5f7fa;
      --sidebar: #ffffff;
      --text: #1e2a3a;
      --text2: #5e6f8d;
      --border: #e9ecf2;
      --ai-bubble: #ffffff;
      --user-bubble: #409eff;
      --input: #ffffff;
      --shadow: rgba(0, 0, 0, 0.03);
      --qzone-card: #ffffff;
    }

    [dark] {
      --bg: #1a1d23;
      --chat-bg: #1e2128;
      --sidebar: #2c2f38;
      --text: #f0f2f5;
      --text2: #b0b7c5;
      --border: #3f4450;
      --ai-bubble: #383d48;
      --user-bubble: #3b8aff;
      --input: #363b46;
      --shadow: rgba(0, 0, 0, 0.2);
      --qzone-card: #2c2f38;
    }

    body { background: var(--bg); height: 100vh; overflow: hidden; color: var(--text); }
    .app { display: flex; height: 100vh; max-width: 100vw; }

    /* 侧边栏 */
    .sidebar {
      width: 360px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 30;
      transition: transform 0.25s;
      box-shadow: 2px 0 12px var(--shadow);
    }
    .sidebar.hide { transform: translateX(-100%); }
    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--border);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 30px;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text2);
    }
    .menu-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      background: #409eff;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      font-size: 1.8rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(64,158,255,0.3);
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      color: var(--text2);
      border: none;
      padding: 8px;
      cursor: pointer;
      border-radius: 20px;
    }
    .tab-btn.active { background: #409eff; color: white; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .form-item { margin-bottom: 1rem; }
    .form-item label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 0.3rem;
    }
    input, textarea, select, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      background: var(--input);
      color: var(--text);
    }
    button {
      background: #409eff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button.gray { background: transparent; color: var(--text); border: 1px solid var(--border); }
    button.small { padding: 8px 12px; font-size: 0.85rem; }
    .button-group { display: flex; gap: 8px; }
    .divider { height: 1px; background: var(--border); margin: 1.2rem 0; }
    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      background: var(--sidebar);
      cursor: pointer;
      border: 2px solid var(--border);
    }
    .avatar-row { display: flex; gap: 16px; margin-top: 4px; }
    .avatar-row > div { flex: 1; text-align: center; }
    .emoji-panel { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0; }
    .emoji {
      font-size: 1.8rem;
      padding: 4px;
      cursor: pointer;
      border-radius: 12px;
      width: 2.4rem;
      text-align: center;
    }
    .emoji:hover { background: var(--border); }

    /* 主内容区 */
    .main-content {
      flex: 1;
      margin-left: 360px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--chat-bg);
      overflow: hidden;
    }
    .view-tabs {
      display: flex;
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      gap: 12px;
    }
    .view-tab {
      background: transparent;
      border: none;
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 30px;
      color: var(--text2);
    }
    .view-tab.active { background: #409eff; color: white; }
    .view-container { flex: 1; overflow-y: auto; padding: 16px; }
    .view-pane { display: none; height: 100%; overflow-y: auto; }
    .view-pane.active { display: block; }

    /* 聊天样式 */
    .msg-box { display: flex; flex-direction: column; gap: 10px; }
    .msg-item { display: flex; gap: 8px; max-width: 88%; }
    .msg-item.user { margin-left: auto; flex-direction: row-reverse; }
    .msg-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: var(--border);
      overflow: hidden;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 22px;
      font-size: 0.95rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg-item.ai .msg-bubble { background: var(--ai-bubble); border-bottom-left-radius: 6px; }
    .msg-item.user .msg-bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 6px; }
    .input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--sidebar);
      border-top: 1px solid var(--border);
    }
    #input { flex: 1; padding: 12px 18px; border-radius: 30px; }
    #send { width: 70px; border-radius: 32px; }

    /* QQ空间样式 - 修复 */
    .qzone-header {
      display: flex;
      gap: 12px;
      background: var(--qzone-card);
      padding: 16px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .qzone-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      overflow: hidden;
      flex-shrink: 0;
    }
    .qzone-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .qzone-input-area { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .qzone-textarea {
      width: 100%;
      background: var(--input);
      padding: 12px;
      border-radius: 20px;
      resize: none;
      border: 1px solid var(--border);
      font-family: inherit;
    }
    .feed-list { display: flex; flex-direction: column; gap: 16px; }
    .qzone-feed-item {
      background: var(--qzone-card);
      border-radius: 20px;
      padding: 16px;
    }
    .feed-header { display: flex; gap: 12px; margin-bottom: 12px; position: relative; align-items: center; }
    .qzone-avatar-img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .qzone-avatar-emoji { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; background: var(--border); }
    .feed-info { flex: 1; }
    .feed-name { font-weight: 600; font-size: 1rem; }
    .feed-time { font-size: 0.7rem; color: var(--text2); }
    .feed-delete-btn {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text2);
      width: 32px;
      padding: 0;
      border-radius: 20px;
    }
    .feed-delete-btn:hover { background: var(--border); }
    .feed-content { margin: 12px 0; line-height: 1.5; white-space: pre-wrap; }
    .feed-stats { display: flex; gap: 16px; font-size: 0.8rem; color: var(--text2); margin-bottom: 8px; }
    .feed-actions-bar { display: flex; gap: 24px; padding-top: 8px; border-top: 1px solid var(--border); }
    .feed-actions-bar button {
      background: transparent;
      color: var(--text2);
      border: none;
      padding: 6px 0;
      cursor: pointer;
      font-size: 0.85rem;
      width: auto;
    }
    .feed-actions-bar button.liked { color: #ff4d4f; }
    .qzone-comments { margin-top: 12px; padding-top: 8px; border-top: 1px solid var(--border); }
    .qzone-comment-item { display: flex; gap: 8px; padding: 6px 0; font-size: 0.85rem; }
    .comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .comment-avatar-emoji { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--border); font-size: 1rem; flex-shrink: 0; }
    .comment-content { flex: 1; word-break: break-word; }
    .comment-name { font-weight: 500; color: #409eff; margin-right: 6px; }
    .comment-text { color: var(--text); }
    .comment-input-area { display: flex; gap: 8px; margin-top: 12px; }
    .comment-input-area input { flex: 1; padding: 8px 12px; font-size: 0.85rem; border-radius: 20px; }
    .comment-input-area button { width: auto; padding: 8px 16px; font-size: 0.85rem; }
    .tip { text-align: center; color: var(--text2); padding: 30px 10px; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.show { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .msg-item { max-width: 90%; }
    }
  </style>
</head>
<body>
  <button class="menu-btn" id="menuBtn">☰</button>

  <div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
      <button class="close-btn" id="closeBtn">✕</button>
      <div class="tabs">
        <button class="tab-btn active" data-tab="chat-tab">💬 聊天设置</button>
        <button class="tab-btn" data-tab="qzone-tab">📱 空间设置</button>
      </div>

      <!-- 聊天设置 -->
      <div id="chat-tab" class="tab-pane active">
        <h2>🐾 404猫娘小爪机</h2>
        <div class="form-item"><label>🔐 API Key</label><input type="password" id="apiKey" placeholder="sk-..."></div>
        <div class="form-item">
          <label>🌐 API 地址（拉不了就加个/v1喵——）</label>
          <div class="button-group">
            <input id="apiUrl" value="https://什么都好喵/v1/chat/completions">
            <button class="small gray" id="fetchModelsBtn">拉取模型</button>
          </div>
        </div>
        <div class="form-item"><label><input type="checkbox" id="useBearer" checked> Bearer前缀</label></div>
        <div class="form-item">
          <label>🧠 模型</label>
          <select id="modelSelect"><option value="">-- 点击拉取 --</option></select>
          <input id="model" placeholder="手动输入" style="margin-top: 6px;" value="gpt-3.5-turbo">
        </div>
        <div class="divider"></div>
        <div class="form-item"><label>🤖 AI 名称</label><input id="botName" value="404猫娘小爪机"></div>
        <div class="form-item"><label>📝 AI 人设</label><textarea id="prompt">你是404小猫娘，一只爱卖萌的男娘小猫，说话结尾带喵，喜欢用颜文字 (｡•̀ᴗ-)✧</textarea></div>
        <div class="form-item"><label>👤 用户人设</label><textarea id="userPrompt">你是404小猫娘的主人。</textarea></div>
        <div class="avatar-row">
          <div><label>😺 AI头像</label><input type="file" accept="image/*" id="botAvatarInput" style="display:none;"><div class="avatar" id="botAvatar">🐱</div></div>
          <div><label>👤 我的头像</label><input type="file" accept="image/*" id="userAvatarInput" style="display:none;"><div class="avatar" id="userAvatar">😏</div></div>
        </div>
        <div class="form-item"><label>🎨 背景色</label><input type="color" id="bgColor" value="#f5f7fa"></div>
        <div class="form-item"><label>💬 气泡色</label><input type="color" id="userColor" value="#409eff"></div>
        <div class="button-group"><button class="small gray" id="darkBtn">🌓 深色切换</button><button id="save">💾 保存</button></div>
      </div>

      <!-- 空间设置 -->
      <div id="qzone-tab" class="tab-pane">
        <h2>📸 QQ空间</h2>
        <div class="form-item"><label>📛 空间昵称</label><input id="qzoneNickname" value="主人"></div>
        <div class="form-item"><label>🖼️ 空间头像</label><input type="file" accept="image/*" id="qzoneAvatarInput" style="display:none;"><div class="avatar" id="qzoneAvatar" style="width:80px;height:80px;font-size:3rem;">😏</div></div>
        <div class="form-item"><label><input type="checkbox" id="autoCommentSwitch" checked> AI自动评论</label></div>
        <div class="divider"></div>
        <div class="form-item"><button class="small gray" id="clearQzoneBtn">🗑️ 清空所有动态</button></div>
      </div>

      <div class="divider"></div>
      <div class="emoji-panel">
        <span class="emoji">😊</span><span class="emoji">😂</span><span class="emoji">🥰</span>
        <span class="emoji">😎</span><span class="emoji">🤔</span><span class="emoji">👍</span>
        <span class="emoji">❤️</span><span class="emoji">🎉</span><span class="emoji">🐱</span>
      </div>
      <div class="button-group">
        <button class="small gray" id="clearChat">🧹 清空聊天</button>
        <button class="small gray" id="exportCfg">📤 导出配置</button>
        <button class="small gray" id="importCfg">📥 导入配置</button>
        <input type="file" id="importFile" accept=".json" style="display:none;">
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
      <div class="view-tabs">
        <button class="view-tab active" data-view="chat">💬 聊天</button>
        <button class="view-tab" data-view="qzone">📸 QQ空间</button>
      </div>
      <div class="view-container">
        <div id="chat-view" class="view-pane active">
          <div class="msg-box" id="msgBox"></div>
          <div class="input-bar">
            <input id="input" placeholder="说点什么...">
            <button id="send">发送</button>
          </div>
        </div>
        <div id="qzone-view" class="view-pane">
          <div class="qzone-header">
            <div class="qzone-avatar" id="qzoneHeaderAvatar">😏</div>
            <div class="qzone-input-area">
              <textarea id="qzoneInput" class="qzone-textarea" rows="2" placeholder="分享新鲜事..."></textarea>
              <button id="publishPostBtn" class="qzone-post-btn" style="width: auto; align-self: flex-end;">📢 发布说说</button>
            </div>
          </div>
          <div id="feedList" class="feed-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // QQ空间模块 - 完全修复
    // ============================================
    class QZoneModule {
      constructor() {
        this.posts = [];
        this.currentUser = { nickname: '主人', avatar: '😏', avatarUrl: null };
        this.aiUser = { nickname: '404猫娘小爪机', avatar: '🐱', avatarUrl: null };
        this.autoComment = true;
        this.loadFromStorage();
      }

      loadFromStorage() {
        try {
          const saved = localStorage.getItem('qzone_posts');
          if (saved) this.posts = JSON.parse(saved);
        } catch(e) { console.warn(e); }
      }

      saveToStorage() {
        localStorage.setItem('qzone_posts', JSON.stringify(this.posts));
      }

      formatTime(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        const diff = now - date;
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
        if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
        if (diff < 604800000) return `${Math.floor(diff / 86400000)}天前`;
        return `${date.getMonth()+1}月${date.getDate()}日`;
      }

      publishPost(content) {
        if (!content.trim()) return null;
        const newPost = {
          id: Date.now(),
          authorName: this.currentUser.nickname,
          authorAvatar: this.currentUser.avatarUrl || this.currentUser.avatar,
          content: content.trim(),
          timestamp: Date.now(),
          likes: [],
          comments: []
        };
        this.posts.unshift(newPost);
        this.saveToStorage();
        return newPost;
      }

      deletePost(postId) {
        const index = this.posts.findIndex(p => p.id === postId);
        if (index !== -1) { this.posts.splice(index, 1); this.saveToStorage(); return true; }
        return false;
      }

      toggleLike(postId, userName) {
        const post = this.posts.find(p => p.id === postId);
        if (!post) return false;
        const idx = post.likes.indexOf(userName);
        if (idx === -1) post.likes.push(userName);
        else post.likes.splice(idx, 1);
        this.saveToStorage();
        return idx === -1;
      }

      addComment(postId, commenterName, text, isAi = false) {
        const post = this.posts.find(p => p.id === postId);
        if (!post || !text.trim()) return null;
        const comment = {
          commenterName: commenterName,
          text: text.trim(),
          timestamp: Date.now(),
          isAi: isAi
        };
        post.comments.push(comment);
        this.saveToStorage();
        return comment;
      }

      getAllPosts() { return [...this.posts]; }

      escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
      }

      renderPost(post) {
        const isLiked = post.likes.includes(this.currentUser.nickname);
        let avatarHtml;
        if (post.authorAvatar && post.authorAvatar.startsWith('data:')) {
          avatarHtml = `<img src="${post.authorAvatar}" class="qzone-avatar-img">`;
        } else {
          avatarHtml = `<div class="qzone-avatar-emoji">${post.authorAvatar || '😺'}</div>`;
        }
        
        let commentsHtml = '';
        if (post.comments && post.comments.length > 0) {
          commentsHtml = `<div class="qzone-comments">`;
          post.comments.forEach(c => {
            let cAvatar;
            if (c.isAi) {
              const aiAvatar = this.aiUser.avatarUrl || this.aiUser.avatar;
              if (aiAvatar && aiAvatar.startsWith('data:')) cAvatar = `<img src="${aiAvatar}" class="comment-avatar">`;
              else cAvatar = `<span class="comment-avatar-emoji">${aiAvatar}</span>`;
            } else {
              const userAvatar = this.currentUser.avatarUrl || this.currentUser.avatar;
              if (userAvatar && userAvatar.startsWith('data:')) cAvatar = `<img src="${userAvatar}" class="comment-avatar">`;
              else cAvatar = `<span class="comment-avatar-emoji">${userAvatar}</span>`;
            }
            commentsHtml += `
              <div class="qzone-comment-item">
                ${cAvatar}
                <div class="comment-content">
                  <span class="comment-name">${this.escapeHtml(c.commenterName)}</span>
                  <span class="comment-text">${this.escapeHtml(c.text)}</span>
                </div>
              </div>
            `;
          });
          commentsHtml += `</div>`;
        }
        
        return `
          <div class="qzone-feed-item" data-post-id="${post.id}">
            <div class="feed-header">
              ${avatarHtml}
              <div class="feed-info">
                <div class="feed-name">${this.escapeHtml(post.authorName)}</div>
                <div class="feed-time">${this.formatTime(post.timestamp)}</div>
              </div>
              <button class="feed-delete-btn" data-id="${post.id}" title="删除">⋯</button>
            </div>
            <div class="feed-content">${this.escapeHtml(post.content).replace(/\n/g, '<br>')}</div>
            <div class="feed-stats">
              <span>❤️ ${post.likes.length}</span>
              <span>💬 ${post.comments.length}</span>
            </div>
            <div class="feed-actions-bar">
              <button class="like-btn ${isLiked ? 'liked' : ''}" data-id="${post.id}">${isLiked ? '❤️ 已赞' : '🤍 点赞'}</button>
              <button class="comment-toggle-btn" data-id="${post.id}">💬 评论</button>
            </div>
            ${commentsHtml}
            <div class="comment-input-area" style="display: none;" data-id="${post.id}">
              <input type="text" placeholder="写评论..." class="comment-input">
              <button class="submit-comment-btn" data-id="${post.id}">发送</button>
            </div>
          </div>
        `;
      }
    }

    // 初始化全局变量
    const qzone = new QZoneModule();
    let config = JSON.parse(localStorage.getItem('catpawCfg')) || {
      apiKey: '', apiUrl: 'https://api.openai.com/v1/chat/completions', model: 'gpt-3.5-turbo',
      botName: '404猫娘小爪机', prompt: '你是404小猫娘，一只爱卖萌的男娘小猫，说话结尾带喵，喜欢用颜文字 (｡•̀ᴗ-)✧',
      userPrompt: '你是404小猫娘的主人。', botAvatar: '🐱', userAvatar: '😏',
      bgColor: '#f5f7fa', userColor: '#409eff', dark: false, useBearer: true,
      qzoneNickname: '主人', qzoneAvatar: '😏', autoComment: true
    };
    let messages = JSON.parse(localStorage.getItem('catpawMsg')) || [];

    // DOM 元素
    const sidebar = document.getElementById('sidebar');
    const msgBox = document.getElementById('msgBox');
    const input = document.getElementById('input');
    const feedList = document.getElementById('feedList');
    const sendBtn = document.getElementById('send');
    const menuBtn = document.getElementById('menuBtn');
    const closeBtn = document.getElementById('closeBtn');

    function isEmoji(str) { return str && !str.startsWith('data:') && !str.startsWith('http') && str.length < 8 && !str.includes('/'); }
    
    function saveConfig() { localStorage.setItem('catpawCfg', JSON.stringify(config)); }
    function saveMessages() { localStorage.setItem('catpawMsg', JSON.stringify(messages)); }

    // 渲染聊天
    function renderMessages() {
      if (!msgBox) return;
      msgBox.innerHTML = '';
      if (messages.length === 0) { msgBox.innerHTML = '<div class="tip">🐱 没有消息，快和猫娘玩耍吧～</div>'; return; }
      messages.forEach(msg => {
        const item = document.createElement('div');
        item.className = `msg-item ${msg.role}`;
        const avatarVal = msg.role === 'user' ? config.userAvatar : config.botAvatar;
        let avatarHtml;
        if (avatarVal && avatarVal.startsWith('data:')) {
          avatarHtml = `<img class="msg-avatar" src="${avatarVal}">`;
        } else {
          avatarHtml = `<div class="msg-avatar">${avatarVal || (msg.role === 'user' ? '😏' : '🐱')}</div>`;
        }
        item.innerHTML = `${avatarHtml}<div class="msg-bubble">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>`;
        msgBox.appendChild(item);
      });
      msgBox.scrollTop = msgBox.scrollHeight;
    }
    
    function addMessage(role, text) { messages.push({ role, text }); saveMessages(); renderMessages(); }
    function escapeHtml(s) { return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    // 渲染QQ空间 - 使用事件委托方式避免绑定失效
    function renderQzone() {
      if (!feedList) return;
      feedList.innerHTML = '';
      const posts = qzone.getAllPosts();
      if (posts.length === 0) { feedList.innerHTML = '<div class="tip">📭 还没有动态，发一条说说吧～</div>'; return; }
      posts.forEach(post => {
        const html = qzone.renderPost(post);
        feedList.insertAdjacentHTML('beforeend', html);
      });
    }

    // 事件委托处理空间所有交互
    function bindQzoneEvents() {
      if (!feedList) return;
      
      feedList.addEventListener('click', (e) => {
        const target = e.target;
        // 删除
        if (target.classList.contains('feed-delete-btn')) {
          const id = parseInt(target.dataset.id);
          if (confirm('删除这条动态？')) {
            qzone.deletePost(id);
            renderQzone();
          }
          return;
        }
        // 点赞
        if (target.classList.contains('like-btn')) {
          const id = parseInt(target.dataset.id);
          qzone.toggleLike(id, qzone.currentUser.nickname);
          renderQzone();
          return;
        }
        // 切换评论框
        if (target.classList.contains('comment-toggle-btn')) {
          const id = target.dataset.id;
          const area = feedList.querySelector(`.comment-input-area[data-id="${id}"]`);
          if (area) area.style.display = area.style.display === 'none' ? 'flex' : 'none';
          return;
        }
        // 提交评论
        if (target.classList.contains('submit-comment-btn')) {
          const id = parseInt(target.dataset.id);
          const area = feedList.querySelector(`.comment-input-area[data-id="${id}"]`);
          const commentInput = area ? area.querySelector('.comment-input') : null;
          if (commentInput && commentInput.value.trim()) {
            qzone.addComment(id, qzone.currentUser.nickname, commentInput.value.trim());
            renderQzone();
          }
          return;
        }
      });
    }

    // AI自动评论
    async function autoCommentOnPost(postId, content) {
      if (!config.autoComment || !config.apiKey) return;
      try {
        const headers = { 'Content-Type': 'application/json' };
        if (config.useBearer) headers['Authorization'] = `Bearer ${config.apiKey}`;
        else headers['Authorization'] = config.apiKey;
        
        const res = await fetch(config.apiUrl, {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({
            model: config.model,
            messages: [
              { role: 'system', content: `${config.prompt}\n你的主人发了一条说说："${content.slice(0, 100)}"，请写一条简短的评论回复。只输出评论内容，保持猫娘风格。` },
              { role: 'user', content: '请评论' }
            ],
            temperature: 0.9,
            max_tokens: 100
          })
        });
        if (!res.ok) return;
        const data = await res.json();
        const comment = data.choices?.[0]?.message?.content?.trim() || '喵~ 这个说说好有趣！(｡•̀ᴗ-)✧';
        qzone.addComment(postId, config.botName, comment, true);
        renderQzone();
      } catch(e) { console.error('AI评论失败', e); }
    }

    // 发布说说
    async function publishPost() {
      const textarea = document.getElementById('qzoneInput');
      if (!textarea) return;
      const content = textarea.value.trim();
      if (!content) return;
      const newPost = qzone.publishPost(content);
      textarea.value = '';
      renderQzone();
      if (newPost && config.autoComment) autoCommentOnPost(newPost.id, content);
    }

    // 发送聊天消息
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      if (!config.apiKey) { alert('请先配置API Key'); return; }
      input.value = '';
      addMessage('user', text);
      
      const recentFeeds = qzone.getAllPosts().slice(0, 3).map(f => `「${f.authorName}：${f.content.slice(0, 50)}」`).join('；');
      const systemContent = `${config.prompt}\n(重要：${config.userPrompt})\n主人最近的QQ空间动态：${recentFeeds || '暂无'}。`;
      
      const loadDiv = document.createElement('div'); loadDiv.className = 'tip'; loadDiv.innerText = '🐾 猫娘思考中...';
      msgBox.appendChild(loadDiv); msgBox.scrollTop = msgBox.scrollHeight;
      try {
        const headers = { 'Content-Type': 'application/json' };
        if (config.useBearer) headers['Authorization'] = `Bearer ${config.apiKey}`;
        else headers['Authorization'] = config.apiKey;
        const res = await fetch(config.apiUrl, {
          method: 'POST', headers,
          body: JSON.stringify({
            model: config.model,
            messages: [{ role: 'system', content: systemContent }, ...messages.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }))],
            temperature: 0.8, max_tokens: 800
          })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        addMessage('ai', data.choices?.[0]?.message?.content || '喵？');
      } catch(e) { addMessage('ai', '⚠️ ' + e.message); }
      finally { if (loadDiv.parentNode) loadDiv.remove(); }
    }

    // UI加载
    function loadUI() {
      document.getElementById('apiKey').value = config.apiKey || '';
      document.getElementById('apiUrl').value = config.apiUrl;
      document.getElementById('model').value = config.model;
      document.getElementById('botName').value = config.botName;
      document.getElementById('prompt').value = config.prompt;
      document.getElementById('userPrompt').value = config.userPrompt;
      document.getElementById('bgColor').value = config.bgColor;
      document.getElementById('userColor').value = config.userColor;
      document.getElementById('useBearer').checked = config.useBearer !== false;
      document.getElementById('qzoneNickname').value = config.qzoneNickname || '主人';
      document.getElementById('autoCommentSwitch').checked = config.autoComment !== false;
      qzone.currentUser.nickname = config.qzoneNickname || '主人';
      qzone.aiUser.nickname = config.botName;
      qzone.autoComment = config.autoComment;
      
      config.qzoneAvatar = config.qzoneAvatar || '😏';
      const qzoneAvatarDiv = document.getElementById('qzoneAvatar');
      if (qzoneAvatarDiv) {
        if (isEmoji(config.qzoneAvatar)) { qzoneAvatarDiv.innerText = config.qzoneAvatar; qzoneAvatarDiv.style.fontSize = '3rem'; qzoneAvatarDiv.innerHTML = config.qzoneAvatar; }
        else { qzoneAvatarDiv.innerHTML = `<img src="${config.qzoneAvatar}" style="width:100%;height:100%;border-radius:50%;">`; }
      }
      const headerAvatar = document.getElementById('qzoneHeaderAvatar');
      if (headerAvatar) {
        if (isEmoji(config.qzoneAvatar)) headerAvatar.innerText = config.qzoneAvatar;
        else headerAvatar.innerHTML = `<img src="${config.qzoneAvatar}" style="width:100%;height:100%;border-radius:50%;">`;
      }
      qzone.currentUser.avatarUrl = isEmoji(config.qzoneAvatar) ? null : config.qzoneAvatar;
      qzone.currentUser.avatar = config.qzoneAvatar;
      qzone.aiUser.avatarUrl = isEmoji(config.botAvatar) ? null : config.botAvatar;
      qzone.aiUser.avatar = config.botAvatar;
      
      const botDiv = document.getElementById('botAvatar');
      if (botDiv) {
        if (isEmoji(config.botAvatar)) { botDiv.innerText = config.botAvatar; botDiv.style.fontSize = '2.5rem'; botDiv.innerHTML = config.botAvatar; }
        else { botDiv.innerHTML = `<img src="${config.botAvatar}" style="width:100%;height:100%;border-radius:50%;">`; }
      }
      const userDiv = document.getElementById('userAvatar');
      if (userDiv) {
        if (isEmoji(config.userAvatar)) { userDiv.innerText = config.userAvatar; userDiv.style.fontSize = '2.5rem'; userDiv.innerHTML = config.userAvatar; }
        else { userDiv.innerHTML = `<img src="${config.userAvatar}" style="width:100%;height:100%;border-radius:50%;">`; }
      }
      
      if (config.dark) document.documentElement.setAttribute('dark', '');
      else document.documentElement.removeAttribute('dark');
      const chatView = document.getElementById('chat-view');
      if (chatView) chatView.style.backgroundColor = config.bgColor;
      document.documentElement.style.setProperty('--user-bubble', config.userColor);
    }

   function saveAll() {
  // 获取并自动补全API地址
  let apiUrl = document.getElementById('apiUrl').value.trim();
  if (apiUrl && !apiUrl.endsWith('/chat/completions')) {
    if (apiUrl.endsWith('/v1')) {
      apiUrl = apiUrl + '/chat/completions';
    } else if (apiUrl.endsWith('/')) {
      apiUrl = apiUrl + 'v1/chat/completions';
    } else {
      apiUrl = apiUrl + '/v1/chat/completions';
    }
    document.getElementById('apiUrl').value = apiUrl;
  }
  
  config.apiKey = document.getElementById('apiKey').value.trim();
  config.apiUrl = apiUrl;
  config.model = document.getElementById('model').value.trim();
  config.botName = document.getElementById('botName').value.trim();
  config.prompt = document.getElementById('prompt').value.trim();
  config.userPrompt = document.getElementById('userPrompt').value.trim();
  config.bgColor = document.getElementById('bgColor').value;
  config.userColor = document.getElementById('userColor').value;
  config.useBearer = document.getElementById('useBearer').checked;
  config.qzoneNickname = document.getElementById('qzoneNickname').value.trim();
  config.autoComment = document.getElementById('autoCommentSwitch').checked;
  saveConfig();
  loadUI();
  alert('配置已保存');
  sidebar.classList.remove('show');
}

    // 头像上传
    function setupAvatar(triggerId, inputId, key, displayId) {
      const trigger = document.getElementById(triggerId);
      const fileInput = document.getElementById(inputId);
      if (trigger && fileInput) {
        trigger.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', function(e) {
          const file = e.target.files[0]; if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => { config[key] = ev.target.result; saveConfig(); loadUI(); };
          reader.readAsDataURL(file);
        });
      }
    }
    setupAvatar('botAvatar', 'botAvatarInput', 'botAvatar', 'botAvatar');
    setupAvatar('userAvatar', 'userAvatarInput', 'userAvatar', 'userAvatar');
    setupAvatar('qzoneAvatar', 'qzoneAvatarInput', 'qzoneAvatar', 'qzoneAvatar');

  // 拉取模型 - 自动补全API地址
async function fetchModels() {
  const apiKey = document.getElementById('apiKey').value.trim();
  let baseUrl = document.getElementById('apiUrl').value.trim();
  
  // 自动补全逻辑
  if (!baseUrl) {
    baseUrl = 'https://api.openai.com/v1/chat/completions';
  }
  // 如果末尾没有 /chat/completions，自动补全
  if (!baseUrl.endsWith('/chat/completions')) {
    if (baseUrl.endsWith('/v1')) {
      baseUrl = baseUrl + '/chat/completions';
    } else if (baseUrl.endsWith('/')) {
      baseUrl = baseUrl + 'v1/chat/completions';
    } else if (!baseUrl.includes('/chat/completions')) {
      baseUrl = baseUrl + '/v1/chat/completions';
    }
  }
  
  if (!apiKey) { alert('请填写API Key'); return; }
  
  // 从 /chat/completions 推导 models 地址
  let modelsUrl = baseUrl.replace('/chat/completions', '/models');
  
  const selectEl = document.getElementById('modelSelect');
  selectEl.innerHTML = '<option>加载中...</option>';
  const headers = { 'Content-Type': 'application/json' };
  if (document.getElementById('useBearer').checked) headers['Authorization'] = `Bearer ${apiKey}`;
  else headers['Authorization'] = apiKey;
  try {
    const res = await fetch(modelsUrl, { method: 'GET', headers });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    let list = data.data || data;
    if (!Array.isArray(list)) list = [];
    selectEl.innerHTML = '<option value="">-- 选择模型 --</option>';
    list.forEach(m => { if (m.id) { let opt = document.createElement('option'); opt.value = m.id; opt.textContent = m.id; selectEl.appendChild(opt); } });
    // 同时更新API地址输入框为补全后的地址
    document.getElementById('apiUrl').value = baseUrl;
  } catch(e) { alert('拉取失败: ' + e.message); selectEl.innerHTML = '<option value="">-- 拉取失败 --</option>'; }
}

    // 事件绑定
    document.getElementById('fetchModelsBtn')?.addEventListener('click', fetchModels);
    document.getElementById('modelSelect')?.addEventListener('change', e => { if(e.target.value) document.getElementById('model').value = e.target.value; });
    document.getElementById('save')?.addEventListener('click', saveAll);
    document.getElementById('darkBtn')?.addEventListener('click', () => { config.dark = !config.dark; saveConfig(); loadUI(); });
    document.getElementById('clearChat')?.addEventListener('click', () => { if(confirm('清空聊天？')) { messages = []; saveMessages(); renderMessages(); } });
    document.getElementById('clearQzoneBtn')?.addEventListener('click', () => { if(confirm('清空所有动态？')) { qzone.posts = []; qzone.saveToStorage(); renderQzone(); } });
    document.getElementById('publishPostBtn')?.addEventListener('click', publishPost);
    document.getElementById('exportCfg')?.addEventListener('click', () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(config)])); a.download = 'catpaw-config.json'; a.click(); });
    document.getElementById('importCfg')?.addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile')?.addEventListener('change', e => {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => { try { const imported = JSON.parse(ev.target.result); config = { ...config, ...imported }; saveConfig(); loadUI(); alert('导入成功'); } catch(e) { alert('无效文件'); } };
      reader.readAsText(file);
    });
    sendBtn?.addEventListener('click', sendMessage);
    input?.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    document.querySelectorAll('.emoji').forEach(em => { em.addEventListener('click', () => { if(input) input.value += em.innerText; input?.focus(); }); });
    menuBtn?.addEventListener('click', () => sidebar.classList.add('show'));
    closeBtn?.addEventListener('click', () => sidebar.classList.remove('show'));

    // 标签页切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });
    document.querySelectorAll('.view-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.view + '-view').classList.add('active');
      });
    });

    // 启动
    loadUI();
    renderMessages();
    renderQzone();
    bindQzoneEvents();
  </script>
</body>
