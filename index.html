<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>404猫娘小爪机 · 猫爪聊天</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    :root {
      --bg: #f5f7fa;
      --chat-bg: #f5f7fa;
      --sidebar: #ffffff;
      --text: #1e2a3a;
      --text2: #5e6f8d;
      --border: #e9ecf2;
      --ai-bubble: #ffffff;
      --user-bubble: #409eff;
      --input: #ffffff;
      --shadow: rgba(0, 0, 0, 0.03);
      --qzone-card: #ffffff;
    }

    [dark] {
      --bg: #1a1d23;
      --chat-bg: #1e2128;
      --sidebar: #2c2f38;
      --text: #f0f2f5;
      --text2: #b0b7c5;
      --border: #3f4450;
      --ai-bubble: #383d48;
      --user-bubble: #3b8aff;
      --input: #363b46;
      --shadow: rgba(0, 0, 0, 0.2);
      --qzone-card: #2c2f38;
    }

    body { background: var(--bg); height: 100vh; overflow: hidden; color: var(--text); }
    .app { display: flex; height: 100vh; max-width: 100vw; }

    .sidebar {
      width: 360px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 30;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 2px 0 12px var(--shadow);
    }
    .sidebar.show { transform: translateX(0); }
    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--border);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 30px;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      background: #409eff;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      font-size: 1.8rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(64,158,255,0.3);
    }
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 25;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }
    .sidebar-overlay.show { opacity: 1; visibility: visible; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .tab-btn { flex: 1; background: transparent; color: var(--text2); border: none; padding: 8px; cursor: pointer; border-radius: 20px; }
    .tab-btn.active { background: #409eff; color: white; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .form-item { margin-bottom: 1rem; }
    .form-item label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--text2); margin-bottom: 0.3rem; }
    input, textarea, select, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      background: var(--input);
      color: var(--text);
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #409eff; }
    button { background: #409eff; color: white; border: none; cursor: pointer; }
    button.gray { background: transparent; color: var(--text); border: 1px solid var(--border); }
    button.small { padding: 8px 12px; font-size: 0.85rem; }
    .button-group { display: flex; gap: 8px; }
    .divider { height: 1px; background: var(--border); margin: 1.2rem 0; }
    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      background: var(--sidebar);
      cursor: pointer;
      border: 2px solid var(--border);
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-row { display: flex; gap: 16px; margin-top: 4px; }
    .avatar-row > div { flex: 1; text-align: center; }
    .emoji-panel { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0; }
    .emoji { font-size: 1.8rem; padding: 4px; cursor: pointer; border-radius: 12px; width: 2.4rem; text-align: center; }
    .emoji:hover { background: var(--border); }

    .main-content {
      flex: 1;
      margin-left: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--chat-bg);
      overflow: hidden;
    }
    .view-tabs {
      display: flex;
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      gap: 12px;
    }
    .view-tab {
      background: transparent;
      border: none;
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 30px;
      color: var(--text2);
    }
    .view-tab.active { background: #409eff; color: white; }
    .view-container { flex: 1; overflow-y: auto; padding: 16px; }
    .view-pane { display: none; height: 100%; overflow-y: auto; }
    .view-pane.active { display: block; }

    .chat-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .chat-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chat-list-item:hover { background: var(--border); }
    .chat-list-item.active { background: rgba(64, 158, 255, 0.1); border-left: 3px solid #409eff; }
    .chat-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .last-msg { font-size: 0.75rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-time { font-size: 0.7rem; color: var(--text2); }
    .unread-count { background: #ff4d4f; color: white; border-radius: 12px; padding: 2px 8px; font-size: 0.7rem; }

    .msg-box { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
    .msg-item { display: flex; gap: 8px; max-width: 88%; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg-item.user { margin-left: auto; flex-direction: row-reverse; }
    .msg-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg-item.ai .msg-bubble { background: var(--ai-bubble); border-bottom-left-radius: 4px; }
    .msg-item.user .msg-bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
    .timestamp { text-align: center; font-size: 0.7rem; color: var(--text2); margin: 8px 0; }
    .loading-tip { text-align: center; color: var(--text2); padding: 12px; font-size: 0.85rem; }

    .input-bar {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: var(--sidebar);
      border-top: 1px solid var(--border);
    }
    #input { flex: 1; padding: 12px 18px; border-radius: 30px; }
    #send { width: 70px; border-radius: 32px; }

    .qzone-header {
      display: flex;
      gap: 12px;
      background: var(--qzone-card);
      padding: 16px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .qzone-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      overflow: hidden;
    }
    .qzone-textarea {
      width: 100%;
      background: var(--input);
      padding: 12px;
      border-radius: 20px;
      resize: none;
      border: 1px solid var(--border);
    }
    .feed-list { display: flex; flex-direction: column; gap: 16px; }
    .qzone-feed-item {
      background: var(--qzone-card);
      border-radius: 20px;
      padding: 16px;
    }
    .feed-header { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
    .feed-info { flex: 1; }
    .feed-name { font-weight: 600; }
    .feed-time { font-size: 0.7rem; color: var(--text2); }
    .feed-content { margin: 12px 0; line-height: 1.5; white-space: pre-wrap; }
    .feed-stats { display: flex; gap: 16px; font-size: 0.8rem; color: var(--text2); margin-bottom: 8px; }
    .feed-actions-bar { display: flex; gap: 24px; padding-top: 8px; border-top: 1px solid var(--border); }
    .feed-actions-bar button {
      background: transparent;
      color: var(--text2);
      border: none;
      padding: 6px 0;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .feed-actions-bar button.liked { color: #ff4d4f; }
    .qzone-comments { margin-top: 12px; padding-top: 8px; border-top: 1px solid var(--border); }
    .qzone-comment-item { display: flex; gap: 8px; padding: 6px 0; font-size: 0.85rem; }
    .comment-input-area { display: flex; gap: 8px; margin-top: 12px; }
    .comment-input-area input { flex: 1; padding: 8px 12px; border-radius: 20px; }
    .tip { text-align: center; color: var(--text2); padding: 30px 10px; }
    @media (max-width: 768px) { .sidebar { width: 280px; } .msg-item { max-width: 90%; } }
    
    .message-actions-modal {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--sidebar);
      border-radius: 20px 20px 0 0;
      padding: 16px;
      transform: translateY(100%);
      transition: transform 0.3s;
      z-index: 100;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
    }
    .message-actions-modal.visible { transform: translateY(0); }
    .message-actions-modal button { padding: 12px; margin: 4px 0; text-align: center; }
  </style>
</head>
<body>
  <button class="menu-btn" id="menuBtn">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app">
    <div class="sidebar" id="sidebar">
      <button class="close-btn" id="closeBtn">✕</button>
      <div class="tabs">
        <button class="tab-btn active" data-tab="chat-tab">💬 聊天设置</button>
        <button class="tab-btn" data-tab="qzone-tab">📱 空间设置</button>
        <button class="tab-btn" data-tab="chats-tab">📋 对话列表</button>
      </div>

      <div id="chat-tab" class="tab-pane active">
        <h2>🐾 404猫娘小爪机</h2>
        <div class="form-item"><label>🔐 API Key</label><input type="password" id="apiKey" placeholder="sk-..."></div>
        <div class="form-item">
          <label>🌐 API 地址</label>
          <div class="button-group">
            <input id="apiUrl" value="https://api.openai.com/v1/chat/completions">
            <button class="small gray" id="fetchModelsBtn">拉取模型</button>
          </div>
        </div>
        <div class="form-item"><label><input type="checkbox" id="useBearer" checked> Bearer前缀</label></div>
        <div class="form-item">
          <label>🧠 模型</label>
          <select id="modelSelect"><option value="">-- 点击拉取 --</option></select>
          <input id="model" placeholder="手动输入" style="margin-top: 6px;" value="gpt-3.5-turbo">
        </div>
        <div class="divider"></div>
        <div class="form-item"><label>🤖 AI 名称</label><input id="botName" value="404猫娘小爪机"></div>
        <div class="form-item"><label>📝 AI 人设</label><textarea id="prompt">你是404小猫娘，一只爱卖萌的男娘小猫，说话结尾带喵，喜欢用颜文字 (｡•̀ᴗ-)✧</textarea></div>
        <div class="form-item"><label>👤 用户人设</label><textarea id="userPrompt">你是404小猫娘的主人。</textarea></div>
        <div class="avatar-row">
          <div><label>😺 AI头像</label><input type="file" accept="image/*" id="botAvatarInput" style="display:none;"><div class="avatar" id="botAvatar">🐱</div></div>
          <div><label>👤 我的头像</label><input type="file" accept="image/*" id="userAvatarInput" style="display:none;"><div class="avatar" id="userAvatar">😏</div></div>
        </div>
        <div class="form-item"><label>🎨 背景色</label><input type="color" id="bgColor" value="#f5f7fa"></div>
        <div class="form-item"><label>💬 气泡色</label><input type="color" id="userColor" value="#409eff"></div>
        <div class="button-group"><button class="small gray" id="darkBtn">🌓 深色切换</button><button id="save">💾 保存</button></div>
      </div>

      <div id="qzone-tab" class="tab-pane">
        <h2>📸 QQ空间</h2>
        <div class="form-item"><label>📛 空间昵称</label><input id="qzoneNickname" value="主人"></div>
        <div class="form-item"><label>🖼️ 空间头像</label><input type="file" accept="image/*" id="qzoneAvatarInput" style="display:none;"><div class="avatar" id="qzoneAvatar" style="width:80px;height:80px;font-size:3rem;">😏</div></div>
        <div class="form-item"><label><input type="checkbox" id="autoCommentSwitch" checked> AI自动评论</label></div>
        <div class="divider"></div>
        <div class="form-item"><button class="small gray" id="clearQzoneBtn">🗑️ 清空所有动态</button></div>
      </div>

      <div id="chats-tab" class="tab-pane">
        <h2>📋 对话列表</h2>
        <div class="button-group" style="margin-bottom: 16px;">
          <button class="small gray" id="newChatBtn">✨ 新建对话</button>
          <button class="small gray" id="clearAllChatsBtn">🗑️ 清空全部</button>
        </div>
        <div id="chatListContainer" class="chat-list"></div>
      </div>

      <div class="divider"></div>
      <div class="emoji-panel">
        <span class="emoji">😊</span><span class="emoji">😂</span><span class="emoji">🥰</span>
        <span class="emoji">😎</span><span class="emoji">🤔</span><span class="emoji">👍</span>
        <span class="emoji">❤️</span><span class="emoji">🎉</span><span class="emoji">🐱</span>
      </div>
      <div class="button-group">
        <button class="small gray" id="clearChat">🧹 清空当前聊天</button>
        <button class="small gray" id="exportCfg">📤 导出配置</button>
        <button class="small gray" id="importCfg">📥 导入配置</button>
        <input type="file" id="importFile" accept=".json" style="display:none;">
      </div>
    </div>

    <div class="main-content">
      <div class="view-tabs">
        <button class="view-tab active" data-view="chat">💬 聊天</button>
        <button class="view-tab" data-view="qzone">📸 QQ空间</button>
      </div>
      <div class="view-container">
        <div id="chat-view" class="view-pane active">
          <div class="msg-box" id="msgBox"></div>
          <div class="input-bar">
            <input id="input" placeholder="说点什么...">
            <button id="send">发送</button>
          </div>
        </div>
        <div id="qzone-view" class="view-pane">
          <div class="qzone-header">
            <div class="qzone-avatar" id="qzoneHeaderAvatar">😏</div>
            <div class="qzone-input-area">
              <textarea id="qzoneInput" class="qzone-textarea" rows="2" placeholder="分享新鲜事..."></textarea>
              <button id="publishPostBtn" style="width: auto; align-self: flex-end;">📢 发布说说</button>
            </div>
          </div>
          <div id="feedList" class="feed-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="message-actions-modal" class="message-actions-modal">
    <button id="copy-message-btn">📋 复制消息</button>
    <button id="delete-message-btn">🗑️ 删除消息</button>
    <button id="close-modal-btn">取消</button>
  </div>

  <script>
    // ==================== 核心数据结构 ====================
    let config = JSON.parse(localStorage.getItem('catpawCfg')) || {
      apiKey: '', apiUrl: 'https://api.openai.com/v1/chat/completions', model: 'gpt-3.5-turbo',
      botName: '404猫娘小爪机', prompt: '你是404小猫娘，一只爱卖萌的男娘小猫，说话结尾带喵，喜欢用颜文字 (｡•̀ᴗ-)✧',
      userPrompt: '你是404小猫娘的主人。', botAvatar: '🐱', userAvatar: '😏',
      bgColor: '#f5f7fa', userColor: '#409eff', dark: false, useBearer: true,
      qzoneNickname: '主人', qzoneAvatar: '😏', autoComment: true
    };
    
    // 聊天存储结构
    let chats = {};
    let activeChatId = null;
    
    // QQ空间模块
    let qzonePosts = [];
    let qzoneUser = { nickname: '主人', avatar: '😏', avatarUrl: null };
    let qzoneAiUser = { nickname: '404猫娘小爪机', avatar: '🐱', avatarUrl: null };
    let qzoneAutoComment = true;
    
    // 初始化数据
    function initStorage() {
      const savedChats = localStorage.getItem('catpaw_chats');
      if (savedChats) {
        chats = JSON.parse(savedChats);
      } else {
        const defaultId = Date.now().toString();
        chats[defaultId] = {
          id: defaultId, name: '默认对话', history: [], isPinned: false
        };
        activeChatId = defaultId;
      }
      if (!activeChatId || !chats[activeChatId]) {
        const first = Object.keys(chats)[0];
        activeChatId = first || Date.now().toString();
        if (!chats[activeChatId]) chats[activeChatId] = { id: activeChatId, name: '默认对话', history: [], isPinned: false };
      }
      saveChats();
      
      const savedPosts = localStorage.getItem('qzone_posts');
      if (savedPosts) qzonePosts = JSON.parse(savedPosts);
    }
    
    function saveChats() { localStorage.setItem('catpaw_chats', JSON.stringify(chats)); }
    function saveQzone() { localStorage.setItem('qzone_posts', JSON.stringify(qzonePosts)); }
    function saveConfig() { localStorage.setItem('catpawCfg', JSON.stringify(config)); }
    
    // 辅助函数
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function isEmoji(str) { return str && !str.startsWith('data:') && !str.startsWith('http') && str.length < 8 && !str.includes('/'); }
    function formatTime(timestamp) {
      if (!timestamp) return '';
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
      if (diff < 604800000) return `${Math.floor(diff / 86400000)}天前`;
      return `${date.getMonth()+1}/${date.getDate()}`;
    }
    
    // 渲染聊天列表
    function renderChatList() {
      const container = document.getElementById('chatListContainer');
      if (!container) return;
      const sorted = Object.values(chats).sort((a,b) => (b.isPinned?1:0) - (a.isPinned?1:0));
      if (sorted.length === 0) { container.innerHTML = '<div class="tip">暂无对话，点击新建对话喵~</div>'; return; }
      container.innerHTML = '';
      sorted.forEach(chat => {
        const lastMsg = chat.history?.slice(-1)[0]?.text || '暂无消息';
        const lastTime = formatTime(chat.history?.slice(-1)[0]?.timestamp);
        const isActive = activeChatId === chat.id;
        const avatarVal = chat.name.includes('猫娘') ? config.botAvatar : config.userAvatar;
        const avatarHtml = (avatarVal && avatarVal.startsWith('data:')) ? `<img src="${avatarVal}" style="width:100%;height:100%;object-fit:cover;">` : (avatarVal || '😺');
        const div = document.createElement('div');
        div.className = `chat-list-item ${isActive ? 'active' : ''}`;
        div.dataset.id = chat.id;
        div.innerHTML = `
          <div class="chat-avatar">${avatarHtml}</div>
          <div class="chat-info">
            <div class="chat-name">${escapeHtml(chat.name)}${chat.isPinned ? ' 📌' : ''}</div>
            <div class="last-msg">${escapeHtml(lastMsg.substring(0, 30))}</div>
          </div>
          <div class="chat-time">${lastTime}</div>
        `;
        div.addEventListener('click', () => { switchChat(chat.id); if (window.innerWidth <= 768) closeSidebar(); });
        div.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          const action = confirm(`操作: ${chat.name}\n确定置顶/取消置顶？\n取消则删除对话。`);
          if (action) { chat.isPinned = !chat.isPinned; saveChats(); renderChatList(); }
          else if (confirm(`删除对话 "${chat.name}"？`)) { delete chats[chat.id]; if (activeChatId === chat.id) { const remain = Object.keys(chats)[0]; activeChatId = remain || null; if (!activeChatId) { const newId = Date.now().toString(); chats[newId] = { id: newId, name: '默认对话', history: [], isPinned: false }; activeChatId = newId; } } saveChats(); renderChatList(); if (activeChatId) renderMessages(); }
        });
        container.appendChild(div);
      });
    }
    
    function switchChat(chatId) {
      if (!chats[chatId]) return;
      activeChatId = chatId;
      saveChats();
      renderChatList();
      renderMessages();
    }
    
    function renderMessages() {
      const msgBox = document.getElementById('msgBox');
      if (!msgBox) return;
      const chat = chats[activeChatId];
      if (!chat || !chat.history) { msgBox.innerHTML = '<div class="tip">🐱 没有消息，快和猫娘玩耍吧～</div>'; return; }
      msgBox.innerHTML = '';
      let lastTime = 0;
      chat.history.forEach(msg => {
        if (lastTime && msg.timestamp - lastTime > 3600000) {
          const timeDiv = document.createElement('div'); timeDiv.className = 'timestamp'; timeDiv.textContent = new Date(msg.timestamp).toLocaleString(); msgBox.appendChild(timeDiv);
        }
        lastTime = msg.timestamp;
        const item = document.createElement('div');
        item.className = `msg-item ${msg.role}`;
        item.dataset.timestamp = msg.timestamp;
        const avatarVal = msg.role === 'user' ? config.userAvatar : config.botAvatar;
        const avatarHtml = (avatarVal && avatarVal.startsWith('data:')) ? `<img class="msg-avatar" src="${avatarVal}">` : `<div class="msg-avatar">${avatarVal || (msg.role === 'user' ? '😏' : '🐱')}</div>`;
        item.innerHTML = `${avatarHtml}<div class="msg-bubble">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>`;
        item.addEventListener('contextmenu', (e) => { e.preventDefault(); window.selectedMsgTimestamp = msg.timestamp; document.getElementById('message-actions-modal')?.classList.add('visible'); });
        msgBox.appendChild(item);
      });
      msgBox.scrollTop = msgBox.scrollHeight;
    }
    
    function addMessage(role, text) {
      if (!chats[activeChatId]) return;
      chats[activeChatId].history.push({ role, text, timestamp: Date.now() });
      saveChats();
      renderMessages();
      renderChatList();
    }
    
    async function sendMessage() {
      const inputEl = document.getElementById('input');
      const text = inputEl.value.trim();
      if (!text) return;
      if (!config.apiKey) { alert('请先配置API Key'); return; }
      inputEl.value = '';
      addMessage('user', text);
      
      const chat = chats[activeChatId];
      const loadingDiv = document.createElement('div'); loadingDiv.className = 'loading-tip'; loadingDiv.innerText = '🐾 猫娘思考中...';
      document.getElementById('msgBox').appendChild(loadingDiv);
      document.getElementById('msgBox').scrollTop = document.getElementById('msgBox').scrollHeight;
      
      try {
        const headers = { 'Content-Type': 'application/json' };
        if (config.useBearer) headers['Authorization'] = `Bearer ${config.apiKey}`;
        else headers['Authorization'] = config.apiKey;
        
        const recentFeeds = qzonePosts.slice(0, 2).map(f => `${f.authorName}:${f.content.slice(0,40)}`).join('；');
        const systemMsg = `${config.prompt}\n(重要：${config.userPrompt})\n主人最近的动态：${recentFeeds || '暂无'}`;
        
        const messagesForAI = chat.history.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }));
        
        const res = await fetch(config.apiUrl, {
          method: 'POST', headers,
          body: JSON.stringify({
            model: config.model,
            messages: [{ role: 'system', content: systemMsg }, ...messagesForAI],
            temperature: 0.8,
            max_tokens: 800
          })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || '喵？没有收到回复呢...';
        addMessage('ai', reply);
      } catch(e) {
        addMessage('ai', `⚠️ 出错了: ${e.message}`);
      } finally {
        if (loadingDiv.parentNode) loadingDiv.remove();
      }
    }
    
    // QQ空间渲染
    function renderQzone() {
      const feedList = document.getElementById('feedList');
      if (!feedList) return;
      if (qzonePosts.length === 0) { feedList.innerHTML = '<div class="tip">📭 还没有动态，发一条说说吧～</div>'; return; }
      feedList.innerHTML = '';
      qzonePosts.forEach(post => {
        const isLiked = post.likes?.includes(qzoneUser.nickname) || false;
        const avatarHtml = (post.authorAvatar && post.authorAvatar.startsWith('data:')) ? `<img src="${post.authorAvatar}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">` : `<div style="width:44px;height:44px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:1.8rem;">${post.authorAvatar || '😺'}</div>`;
        let commentsHtml = '';
        if (post.comments?.length) {
          commentsHtml = `<div class="qzone-comments">`;
          post.comments.forEach(c => {
            const cAvatar = (c.isAi && qzoneAiUser.avatarUrl) ? `<img src="${qzoneAiUser.avatarUrl}" style="width:28px;height:28px;border-radius:50%;">` : `<span style="width:28px;height:28px;border-radius:50%;background:var(--border);display:inline-flex;align-items:center;justify-content:center;">${c.isAi ? (qzoneAiUser.avatar || '🐱') : (qzoneUser.avatar || '😏')}</span>`;
            commentsHtml += `<div class="qzone-comment-item">${cAvatar}<div class="comment-content"><span class="comment-name">${escapeHtml(c.commenterName)}</span> <span>${escapeHtml(c.text)}</span></div></div>`;
          });
          commentsHtml += `</div>`;
        }
        const feedDiv = document.createElement('div');
        feedDiv.className = 'qzone-feed-item';
        feedDiv.dataset.id = post.id;
        feedDiv.innerHTML = `
          <div class="feed-header">${avatarHtml}<div class="feed-info"><div class="feed-name">${escapeHtml(post.authorName)}</div><div class="feed-time">${formatTime(post.timestamp)}</div></div><button class="feed-delete-btn" data-id="${post.id}" style="background:none;border:none;font-size:1.2rem;cursor:pointer;">⋯</button></div>
          <div class="feed-content">${escapeHtml(post.content).replace(/\n/g, '<br>')}</div>
          <div class="feed-stats"><span>❤️ ${post.likes?.length || 0}</span><span>💬 ${post.comments?.length || 0}</span></div>
          <div class="feed-actions-bar"><button class="like-btn ${isLiked ? 'liked' : ''}" data-id="${post.id}">${isLiked ? '❤️ 已赞' : '🤍 点赞'}</button><button class="comment-toggle-btn" data-id="${post.id}">💬 评论</button></div>
          ${commentsHtml}
          <div class="comment-input-area" style="display:none;" data-id="${post.id}"><input type="text" placeholder="写评论..." class="comment-input"><button class="submit-comment-btn" data-id="${post.id}">发送</button></div>
        `;
        feedList.appendChild(feedDiv);
      });
    }
    
    function bindQzoneEvents() {
      const feedList = document.getElementById('feedList');
      if (!feedList) return;
      feedList.addEventListener('click', (e) => {
        const target = e.target;
        if (target.classList.contains('feed-delete-btn')) {
          const id = parseInt(target.dataset.id);
          if (confirm('删除这条动态？')) { qzonePosts = qzonePosts.filter(p => p.id !== id); saveQzone(); renderQzone(); }
        } else if (target.classList.contains('like-btn')) {
          const id = parseInt(target.dataset.id);
          const post = qzonePosts.find(p => p.id === id);
          if (post) { if (!post.likes) post.likes = []; const idx = post.likes.indexOf(qzoneUser.nickname); if (idx === -1) post.likes.push(qzoneUser.nickname); else post.likes.splice(idx, 1); saveQzone(); renderQzone(); }
        } else if (target.classList.contains('comment-toggle-btn')) {
          const id = target.dataset.id;
          const area = feedList.querySelector(`.comment-input-area[data-id="${id}"]`);
          if (area) area.style.display = area.style.display === 'none' ? 'flex' : 'none';
        } else if (target.classList.contains('submit-comment-btn')) {
          const id = parseInt(target.dataset.id);
          const area = feedList.querySelector(`.comment-input-area[data-id="${id}"]`);
          const input = area?.querySelector('.comment-input');
          if (input && input.value.trim()) {
            const post = qzonePosts.find(p => p.id === id);
            if (post) { if (!post.comments) post.comments = []; post.comments.push({ commenterName: qzoneUser.nickname, text: input.value.trim(), timestamp: Date.now(), isAi: false }); saveQzone(); renderQzone(); }
          }
        }
      });
    }
    
    function publishPost() {
      const textarea = document.getElementById('qzoneInput');
      if (!textarea || !textarea.value.trim()) return;
      const newPost = { id: Date.now(), authorName: qzoneUser.nickname, authorAvatar: qzoneUser.avatarUrl || qzoneUser.avatar, content: textarea.value.trim(), timestamp: Date.now(), likes: [], comments: [] };
      qzonePosts.unshift(newPost);
      saveQzone();
      textarea.value = '';
      renderQzone();
      if (qzoneAutoComment && config.apiKey) autoCommentOnPost(newPost.id, newPost.content);
    }
    
    async function autoCommentOnPost(postId, content) {
      try {
        const headers = { 'Content-Type': 'application/json' };
        if (config.useBearer) headers['Authorization'] = `Bearer ${config.apiKey}`;
        else headers['Authorization'] = config.apiKey;
        const res = await fetch(config.apiUrl, {
          method: 'POST', headers,
          body: JSON.stringify({ model: config.model, messages: [{ role: 'system', content: `${config.prompt}\n主人发了说说："${content.slice(0,80)}"，写一条简短的猫娘风格评论，只输出评论内容。` }, { role: 'user', content: '评论' }], temperature: 0.9, max_tokens: 80 })
        });
        if (!res.ok) return;
        const data = await res.json();
        const commentText = data.choices?.[0]?.message?.content?.trim() || '喵~ 好有趣的说！(｡•̀ᴗ-)✧';
        const post = qzonePosts.find(p => p.id === postId);
        if (post) { if (!post.comments) post.comments = []; post.comments.push({ commenterName: config.botName, text: commentText, timestamp: Date.now(), isAi: true }); saveQzone(); renderQzone(); }
      } catch(e) { console.warn('AI评论失败'); }
    }
    
    function loadUI() {
      document.getElementById('apiKey').value = config.apiKey || '';
      document.getElementById('apiUrl').value = config.apiUrl;
      document.getElementById('model').value = config.model;
      document.getElementById('botName').value = config.botName;
      document.getElementById('prompt').value = config.prompt;
      document.getElementById('userPrompt').value = config.userPrompt;
      document.getElementById('bgColor').value = config.bgColor;
      document.getElementById('userColor').value = config.userColor;
      document.getElementById('useBearer').checked = config.useBearer;
      document.getElementById('qzoneNickname').value = config.qzoneNickname;
      document.getElementById('autoCommentSwitch').checked = config.autoComment;
      qzoneUser.nickname = config.qzoneNickname || '主人';
      qzoneAutoComment = config.autoComment;
      qzoneUser.avatar = config.qzoneAvatar;
      qzoneUser.avatarUrl = isEmoji(config.qzoneAvatar) ? null : config.qzoneAvatar;
      qzoneAiUser.nickname = config.botName;
      qzoneAiUser.avatar = config.botAvatar;
      qzoneAiUser.avatarUrl = isEmoji(config.botAvatar) ? null : config.botAvatar;
      
      const qzoneAv = document.getElementById('qzoneAvatar');
      if (qzoneAv) { if (isEmoji(config.qzoneAvatar)) { qzoneAv.innerText = config.qzoneAvatar; qzoneAv.innerHTML = config.qzoneAvatar; } else qzoneAv.innerHTML = `<img src="${config.qzoneAvatar}" style="width:100%;height:100%;border-radius:50%;">`; }
      const headerAv = document.getElementById('qzoneHeaderAvatar');
      if (headerAv) { if (isEmoji(config.qzoneAvatar)) headerAv.innerText = config.qzoneAvatar; else headerAv.innerHTML = `<img src="${config.qzoneAvatar}" style="width:100%;height:100%;border-radius:50%;">`; }
      const botDiv = document.getElementById('botAvatar');
      if (botDiv) { if (isEmoji(config.botAvatar)) { botDiv.innerText = config.botAvatar; botDiv.innerHTML = config.botAvatar; } else botDiv.innerHTML = `<img src="${config.botAvatar}" style="width:100%;height:100%;border-radius:50%;">`; }
      const userDiv = document.getElementById('userAvatar');
      if (userDiv) { if (isEmoji(config.userAvatar)) { userDiv.innerText = config.userAvatar; userDiv.innerHTML = config.userAvatar; } else userDiv.innerHTML = `<img src="${config.userAvatar}" style="width:100%;height:100%;border-radius:50%;">`; }
      if (config.dark) document.documentElement.setAttribute('dark', '');
      else document.documentElement.removeAttribute('dark');
      document.documentElement.style.setProperty('--user-bubble', config.userColor);
      const chatView = document.getElementById('chat-view');
      if (chatView) chatView.style.backgroundColor = config.bgColor;
    }
    
    function saveAllSettings() {
      let apiUrl = document.getElementById('apiUrl').value.trim();
      if (apiUrl && !apiUrl.endsWith('/chat/completions')) {
        if (apiUrl.endsWith('/v1')) apiUrl = apiUrl + '/chat/completions';
        else if (apiUrl.endsWith('/')) apiUrl = apiUrl + 'v1/chat/completions';
        else apiUrl = apiUrl + '/v1/chat/completions';
        document.getElementById('apiUrl').value = apiUrl;
      }
      config.apiKey = document.getElementById('apiKey').value.trim();
      config.apiUrl = apiUrl;
      config.model = document.getElementById('model').value.trim();
      config.botName = document.getElementById('botName').value.trim();
      config.prompt = document.getElementById('prompt').value.trim();
      config.userPrompt = document.getElementById('userPrompt').value.trim();
      config.bgColor = document.getElementById('bgColor').value;
      config.userColor = document.getElementById('userColor').value;
      config.useBearer = document.getElementById('useBearer').checked;
      config.qzoneNickname = document.getElementById('qzoneNickname').value.trim();
      config.autoComment = document.getElementById('autoCommentSwitch').checked;
      saveConfig();
      loadUI();
      alert('配置已保存');
      closeSidebar();
    }
    
    function setupAvatar(triggerId, inputId, key) {
      const trigger = document.getElementById(triggerId);
      const fileInput = document.getElementById(inputId);
      if (trigger && fileInput) { trigger.addEventListener('click', () => fileInput.click()); fileInput.addEventListener('change', e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = ev => { config[key] = ev.target.result; saveConfig(); loadUI(); }; r.readAsDataURL(f); } }); }
    }
    
    async function fetchModels() {
      const apiKey = document.getElementById('apiKey').value.trim();
      let baseUrl = document.getElementById('apiUrl').value.trim();
      if (!baseUrl) baseUrl = 'https://api.openai.com/v1/chat/completions';
      if (!apiKey) { alert('请填写API Key'); return; }
      let modelsUrl = baseUrl.replace('/chat/completions', '/models');
      const headers = { 'Content-Type': 'application/json' };
      if (document.getElementById('useBearer').checked) headers['Authorization'] = `Bearer ${apiKey}`;
      else headers['Authorization'] = apiKey;
      const selectEl = document.getElementById('modelSelect');
      selectEl.innerHTML = '<option>加载中...</option>';
      try {
        const res = await fetch(modelsUrl, { method: 'GET', headers });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const list = data.data || data;
        selectEl.innerHTML = '<option value="">-- 选择模型 --</option>';
        if (Array.isArray(list)) list.forEach(m => { if (m.id) { const opt = document.createElement('option'); opt.value = m.id; opt.textContent = m.id; selectEl.appendChild(opt); } });
      } catch(e) { alert('拉取失败: ' + e.message); selectEl.innerHTML = '<option value="">-- 拉取失败 --</option>'; }
    }
    
    // 侧边栏控制
    function openSidebar() { document.getElementById('sidebar').classList.add('show'); document.getElementById('sidebarOverlay').classList.add('show'); document.body.style.overflow = 'hidden'; }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('show'); document.getElementById('sidebarOverlay').classList.remove('show'); document.body.style.overflow = ''; }
    
    // 事件绑定
    document.getElementById('menuBtn')?.addEventListener('click', openSidebar);
    document.getElementById('closeBtn')?.addEventListener('click', closeSidebar);
    document.getElementById('sidebarOverlay')?.addEventListener('click', closeSidebar);
    document.getElementById('send')?.addEventListener('click', sendMessage);
    document.getElementById('input')?.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    document.getElementById('save')?.addEventListener('click', saveAllSettings);
    document.getElementById('darkBtn')?.addEventListener('click', () => { config.dark = !config.dark; saveConfig(); loadUI(); });
    document.getElementById('clearChat')?.addEventListener('click', () => { if (confirm('清空当前对话？')) { if (chats[activeChatId]) { chats[activeChatId].history = []; saveChats(); renderMessages(); renderChatList(); } } });
    document.getElementById('clearAllChatsBtn')?.addEventListener('click', () => { if (confirm('清空所有对话？')) { chats = {}; const newId = Date.now().toString(); chats[newId] = { id: newId, name: '默认对话', history: [], isPinned: false }; activeChatId = newId; saveChats(); renderChatList(); renderMessages(); } });
    document.getElementById('newChatBtn')?.addEventListener('click', () => { const name = prompt('对话名称:', `对话 ${Object.keys(chats).length+1}`); const newId = Date.now().toString(); chats[newId] = { id: newId, name: name || `对话 ${Object.keys(chats).length+1}`, history: [], isPinned: false }; activeChatId = newId; saveChats(); renderChatList(); renderMessages(); closeSidebar(); });
    document.getElementById('clearQzoneBtn')?.addEventListener('click', () => { if (confirm('清空所有动态？')) { qzonePosts = []; saveQzone(); renderQzone(); } });
    document.getElementById('publishPostBtn')?.addEventListener('click', publishPost);
    document.getElementById('exportCfg')?.addEventListener('click', () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(config)])); a.download = 'catpaw-config.json'; a.click(); });
    document.getElementById('importCfg')?.addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile')?.addEventListener('change', e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = ev => { try { const imp = JSON.parse(ev.target.result); config = { ...config, ...imp }; saveConfig(); loadUI(); alert('导入成功'); } catch(e) { alert('无效文件'); } }; r.readAsText(f); } });
    document.getElementById('fetchModelsBtn')?.addEventListener('click', fetchModels);
    document.getElementById('modelSelect')?.addEventListener('change', e => { if (e.target.value) document.getElementById('model').value = e.target.value; });
    document.querySelectorAll('.emoji').forEach(em => { em.addEventListener('click', () => { const inp = document.getElementById('input'); if (inp) inp.value += em.innerText; inp?.focus(); }); });
    document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active')); btn.classList.add('active'); document.getElementById(btn.dataset.tab).classList.add('active'); }); });
    document.querySelectorAll('.view-tab').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active')); document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active')); btn.classList.add('active'); document.getElementById(btn.dataset.view + '-view').classList.add('active'); }); });
    document.getElementById('copy-message-btn')?.addEventListener('click', () => { const chat = chats[activeChatId]; const msg = chat?.history?.find(m => m.timestamp === window.selectedMsgTimestamp); if (msg) { navigator.clipboard.writeText(msg.text); alert('已复制'); } document.getElementById('message-actions-modal')?.classList.remove('visible'); });
    document.getElementById('delete-message-btn')?.addEventListener('click', () => { if (window.selectedMsgTimestamp && confirm('删除此消息？')) { const idx = chats[activeChatId]?.history?.findIndex(m => m.timestamp === window.selectedMsgTimestamp); if (idx !== undefined && idx !== -1) { chats[activeChatId].history.splice(idx, 1); saveChats(); renderMessages(); renderChatList(); } } document.getElementById('message-actions-modal')?.classList.remove('visible'); });
    document.getElementById('close-modal-btn')?.addEventListener('click', () => { document.getElementById('message-actions-modal')?.classList.remove('visible'); });
    
    setupAvatar('botAvatar', 'botAvatarInput', 'botAvatar');
    setupAvatar('userAvatar', 'userAvatarInput', 'userAvatar');
    setupAvatar('qzoneAvatar', 'qzoneAvatarInput', 'qzoneAvatar');
    
    initStorage();
    loadUI();
    renderChatList();
    renderMessages();
    renderQzone();
    bindQzoneEvents();
  </script>
</body>
</html>
